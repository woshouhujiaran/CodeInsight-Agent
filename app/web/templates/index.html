<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CodeInsight-Agent Web</title>
  <style>
    :root{color-scheme:dark;--bg:#0b0f1a;--bg2:#0f172a;--surface:rgba(15,23,42,.88);--surface-strong:rgba(15,23,42,.96);--text:#e5e7eb;--muted:#9ca3af;--subtle:#64748b;--line:rgba(148,163,184,.16);--line2:rgba(148,163,184,.3);--accent:rgba(110,168,254,.16);--warn:#f59e0b;--ok:#34d399;--err:#f87171;--panel-radius:18px;--card-radius:14px;--control-radius:10px;--shadow:0 18px 48px rgba(2,6,23,.32);--layout-gap:10px;--sidebar-width:clamp(260px,20vw,320px);--assistant-width:clamp(340px,24vw,440px)}
    *{box-sizing:border-box}html,body{width:100%;height:100%;min-height:100%}body{margin:0;width:100vw;height:100vh;overflow:hidden;font-family:"SF Pro Display","Segoe UI Variable","PingFang SC","Microsoft YaHei",sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;color:var(--text);background:radial-gradient(circle at top left,rgba(59,130,246,.14),transparent 28%),radial-gradient(circle at bottom right,rgba(16,185,129,.08),transparent 26%),linear-gradient(180deg,var(--bg),var(--bg2) 56%,#111827)}
    button,input,textarea{font:inherit;color:inherit;appearance:none}button:focus-visible,input:focus-visible,textarea:focus-visible{outline:none;box-shadow:0 0 0 4px rgba(110,168,254,.16);border-color:rgba(110,168,254,.64)}
    .layout{display:grid;grid-template-columns:var(--sidebar-width) minmax(0,1fr) var(--assistant-width);align-items:stretch;gap:var(--layout-gap);width:100vw;height:100vh;min-height:100vh;padding:var(--layout-gap)}
    .panel{display:flex;flex-direction:column;min-width:0;min-height:0;background:linear-gradient(180deg,rgba(255,255,255,.03),transparent 20%),var(--surface);border:1px solid var(--line);border-radius:var(--panel-radius);box-shadow:var(--shadow);overflow:hidden}
    .panel-header{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line);background:rgba(15,23,42,.42)}
    .panel-title{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--subtle)}.panel-subtitle{font-size:12px;line-height:1.5;color:var(--muted)}.stack{display:flex;flex-direction:column;gap:4px}.panel-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.panel-actions button{flex:0 0 auto}
    .scroll{overflow:auto;display:flex;flex-direction:column;gap:10px;min-height:0}.sidebar,.assistant,.editor{min-width:0;min-height:0}
    .sidebar{display:grid;grid-template-rows:auto minmax(0,1fr)}.sidebar-body{display:grid;grid-template-rows:minmax(200px,.72fr) minmax(0,1fr);gap:10px;padding:10px;min-height:0}.sidebar-card{display:flex;flex-direction:column;gap:10px;padding:10px 12px;min-height:0}.sidebar-tree-card{min-height:0}
    .editor{display:grid;grid-template-rows:auto auto auto auto minmax(0,1fr)}.assistant{display:grid;grid-template-rows:auto minmax(0,1fr)}.assistant-chat-shell{padding:10px;min-height:0;display:flex}
    .card{background:rgba(15,23,42,.76);border:1px solid var(--line);border-radius:var(--card-radius);padding:12px;box-shadow:inset 0 1px 0 rgba(255,255,255,.02)}.section-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}.section-head h3{margin:0;font-size:14px}
    .row{display:flex;gap:8px;align-items:center}.row>*{flex:1}.session-list{display:flex;flex-direction:column;gap:10px;min-height:0;overflow:auto;padding-right:2px}.session-group{display:flex;flex-direction:column;gap:8px}.session-group-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}.session-group-title{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--subtle)}.session-group-note{font-size:12px;line-height:1.5;color:var(--muted)}.session-card{padding:10px 12px;border-radius:14px;border:1px solid transparent;background:rgba(148,163,184,.05);cursor:pointer}.session-card:hover{border-color:var(--line2)}.session-card.active{background:var(--accent);border-color:rgba(110,168,254,.34)}.session-title{font-weight:700;margin-bottom:4px}.session-meta{font-size:12px;line-height:1.55;color:var(--muted)}
    .mono,.empty,.task-summary{font-size:12px;line-height:1.65;color:var(--muted);white-space:pre-wrap;word-break:break-word}.mono{padding:8px 10px;border-radius:var(--control-radius);background:rgba(148,163,184,.06);border:1px solid rgba(148,163,184,.12)}.empty{padding:12px;border-radius:var(--card-radius);border:1px dashed rgba(148,163,184,.18);background:rgba(148,163,184,.04)}
    button{border:1px solid transparent;border-radius:var(--control-radius);background:linear-gradient(135deg,rgba(110,168,254,.9),rgba(59,130,246,.72));color:#eff6ff;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer;box-shadow:0 8px 20px rgba(37,99,235,.18)}button:disabled{opacity:.48;cursor:not-allowed;box-shadow:none}button.secondary{background:rgba(15,23,42,.72);border-color:var(--line);color:var(--text)}button.warn{background:linear-gradient(135deg,rgba(245,158,11,.84),rgba(217,119,6,.7));color:#fff7ed}button.ghost{background:transparent;border:none;padding:4px 6px;color:var(--muted);box-shadow:none}
    textarea,input[type="text"],input[type="number"]{width:100%;border:1px solid rgba(148,163,184,.14);border-radius:var(--control-radius);padding:10px 12px;background:rgba(15,23,42,.72);color:var(--text);box-shadow:inset 0 1px 0 rgba(255,255,255,.02)}textarea::placeholder,input::placeholder{color:var(--subtle)}textarea{min-height:108px;resize:vertical}
    .settings-card{display:flex;flex-direction:column;gap:12px}.settings-head{margin-bottom:0}.settings-grid{display:grid;gap:12px}.field{display:flex;flex-direction:column;gap:8px}.field-label{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--subtle)}.workspace-picker-row{display:flex;gap:8px;flex-wrap:wrap}.workspace-picker-row button{padding:8px 12px;border-radius:10px;font-weight:600}.settings-inline{display:grid;grid-template-columns:minmax(0,1fr) 92px;gap:10px}.setting-pills{display:flex;flex-wrap:wrap;gap:8px}.toggle-chip{position:relative;display:inline-flex}.toggle-chip input{position:absolute;opacity:0;pointer-events:none}.toggle-chip span{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border-radius:999px;border:1px solid rgba(148,163,184,.16);background:rgba(148,163,184,.05);font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;transition:background .16s ease,border-color .16s ease,color .16s ease}.toggle-chip span::before{content:"";width:8px;height:8px;border-radius:999px;background:var(--subtle)}.toggle-chip input:checked+span{background:var(--accent);border-color:rgba(110,168,254,.28);color:var(--text)}.toggle-chip input:checked+span::before{background:#93c5fd}
    .toggle{display:flex;justify-content:space-between;align-items:center;gap:12px;margin:12px 0;padding:12px 14px;border-radius:14px;border:1px solid rgba(148,163,184,.12);background:rgba(148,163,184,.04);font-size:13px}
    input[type="checkbox"]{position:relative;width:42px;height:24px;border-radius:999px;border:1px solid rgba(148,163,184,.28);background:rgba(15,23,42,.92);cursor:pointer}input[type="checkbox"]::before{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:999px;background:#94a3b8;transition:transform .18s ease}input[type="checkbox"]:checked{border-color:rgba(110,168,254,.46);background:rgba(110,168,254,.22)}input[type="checkbox"]:checked::before{transform:translateX(18px);background:#eff6ff}
    .workspace-tree{display:flex;flex-direction:column;gap:2px;flex:1;min-height:0;overflow:auto;padding-right:2px}.tree-node{display:flex;flex-direction:column;gap:2px}.tree-row{display:flex;align-items:center;gap:4px;min-height:28px;padding:0 4px;border-radius:9px;border:1px solid transparent}.tree-row:hover{background:rgba(148,163,184,.06)}.tree-row.active{background:var(--accent);border-color:rgba(110,168,254,.24)}.tree-toggle,.tree-spacer{flex:0 0 18px;width:18px;height:18px;display:grid;place-items:center;text-align:center}.tree-toggle{background:transparent;border:none;padding:0;border-radius:6px;color:var(--subtle)}.tree-toggle:hover{background:rgba(148,163,184,.12);color:var(--text)}.tree-action{flex:1;display:flex;align-items:center;justify-content:space-between;gap:8px;min-width:0;padding:4px 0;background:transparent;border:none;text-align:left;color:var(--text)}.tree-main{display:flex;align-items:center;gap:8px;min-width:0}.tree-children{display:flex;flex-direction:column;gap:2px;margin-left:12px;padding-left:8px;border-left:1px solid rgba(148,163,184,.12)}.tree-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.tree-meta{flex:0 0 auto;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--subtle)}.tree-icon{position:relative;flex:0 0 16px;width:16px;height:16px}.tree-icon.folder::before{content:"";position:absolute;left:1px;top:4px;width:14px;height:10px;border:1px solid rgba(96,165,250,.5);border-radius:4px;background:rgba(59,130,246,.18)}.tree-icon.folder::after{content:"";position:absolute;left:2px;top:1px;width:7px;height:4px;border:1px solid rgba(96,165,250,.44);border-bottom:none;border-radius:3px 3px 0 0;background:rgba(96,165,250,.2)}.tree-icon.folder.open::before{border-color:rgba(250,204,21,.48);background:rgba(250,204,21,.18)}.tree-icon.folder.open::after{border-color:rgba(250,204,21,.44);background:rgba(250,204,21,.2)}.tree-icon.file::before{content:"";position:absolute;left:2px;top:1px;width:11px;height:14px;border:1px solid rgba(148,163,184,.38);border-radius:3px;background:rgba(148,163,184,.12)}.tree-icon.file::after{content:"";position:absolute;top:2px;left:9px;width:4px;height:4px;border-top:1px solid rgba(148,163,184,.38);border-right:1px solid rgba(148,163,184,.38);background:rgba(148,163,184,.22);transform:skew(-10deg,-10deg)}
    .toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line);background:rgba(2,6,23,.16)}.toolbar-actions{display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-wrap:wrap}.toolbar-actions button.active{background:var(--accent);border-color:rgba(110,168,254,.28);color:var(--text)}.editor-title{font-size:16px;font-weight:700}.context-drawer{padding:0 14px 10px;border-bottom:1px solid var(--line);background:rgba(2,6,23,.18)}.context-drawer[hidden]{display:none}.context-drawer-frame{display:flex;flex-direction:column;min-height:0;border:1px solid var(--line);border-radius:var(--card-radius);background:rgba(15,23,42,.76);overflow:hidden}.context-drawer-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:10px 12px;border-bottom:1px solid var(--line);background:rgba(2,6,23,.16)}.context-drawer-body{padding:12px;overflow:auto;max-height:300px}.drawer-panel{display:flex;flex-direction:column;gap:12px}.file-tabs{display:flex;gap:5px;padding:7px 14px;overflow:auto;border-bottom:1px solid var(--line);background:rgba(2,6,23,.26);min-height:42px}.file-tab{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:9px;border:1px solid rgba(148,163,184,.14);background:rgba(15,23,42,.72);cursor:pointer;color:var(--muted);font-size:12px}.file-tab:hover{border-color:rgba(148,163,184,.24);color:var(--text)}.file-tab.active{background:var(--accent);border-color:rgba(110,168,254,.28);color:var(--text)}.file-tab.dirty .file-name::after{content:" •";color:var(--warn)}.file-name{max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .editor-shell{display:grid;grid-template-rows:minmax(0,1fr) 260px;gap:10px;padding:10px 14px 14px;min-height:0}.pane{display:flex;flex-direction:column;min-height:0;border:1px solid var(--line);border-radius:var(--card-radius);background:rgba(15,23,42,.72);overflow:hidden}.pane-head{padding:10px 12px;border-bottom:1px solid var(--line);background:rgba(2,6,23,.14)}.pane-title{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--subtle)}.pane-subtitle{font-size:12px;line-height:1.5;color:var(--muted);white-space:pre-wrap;word-break:break-word}.editor-empty{margin:12px}.editor-textarea{flex:1;min-height:0;border:none;padding:14px;background:transparent;resize:none;font-family:"Cascadia Code","SFMono-Regular",Consolas,monospace;font-size:13px;line-height:1.65}.editor-textarea[disabled]{color:var(--muted);cursor:not-allowed}
    .change-browser{display:grid;grid-template-columns:minmax(180px,220px) minmax(0,1fr);min-height:0;flex:1}.changed-files{display:flex;flex-direction:column;min-height:0;border-right:1px solid var(--line);background:rgba(2,6,23,.14)}.changed-files-head{padding:10px 12px;border-bottom:1px solid var(--line);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--subtle)}.changed-files-list{display:flex;flex-direction:column;gap:6px;padding:10px;overflow:auto;min-height:0}.changed-file{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 10px;border-radius:10px;border:1px solid transparent;background:rgba(148,163,184,.04);box-shadow:none;color:var(--text);text-align:left;cursor:pointer}.changed-file:hover{border-color:var(--line2)}.changed-file.active{background:var(--accent);border-color:rgba(110,168,254,.28)}.changed-file-main{min-width:0}.changed-file-name{display:block;font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.changed-file-path{display:block;font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.changed-file-status{flex:0 0 auto;padding:3px 6px;border-radius:999px;background:rgba(248,113,113,.16);color:#fecaca;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}.diff-viewer{display:flex;flex-direction:column;min-width:0;min-height:0}.diff-columns{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);border-bottom:1px solid var(--line);background:rgba(2,6,23,.16)}.diff-column-title{padding:8px 12px;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--subtle)}.diff-column-title+.diff-column-title{border-left:1px solid rgba(148,163,184,.12)}.diff-view{flex:1;min-height:0;overflow:auto;font-family:"Cascadia Code","SFMono-Regular",Consolas,monospace;font-size:12.5px;line-height:1.55}.diff-row{display:grid;grid-template-columns:56px minmax(0,1fr) 56px minmax(0,1fr);border-bottom:1px solid rgba(148,163,184,.08)}.diff-no{padding:5px 8px;color:var(--subtle);text-align:right}.diff-cell{padding:5px 12px;white-space:pre-wrap;word-break:break-word}.diff-no.after,.diff-cell.after{border-left:1px solid rgba(148,163,184,.12)}.diff-row.context .diff-cell{color:var(--muted)}.diff-row.removed .diff-no.before,.diff-row.removed .diff-cell.before,.diff-row.modify .diff-no.before,.diff-row.modify .diff-cell.before{background:rgba(248,113,113,.12);color:#fee2e2}.diff-row.added .diff-no.after,.diff-row.added .diff-cell.after,.diff-row.modify .diff-no.after,.diff-row.modify .diff-cell.after{background:rgba(52,211,153,.12);color:#d1fae5}
    .chat-card{display:grid;grid-template-rows:auto minmax(240px,1fr) auto;min-height:0;flex:1;padding:0;overflow:hidden}.chat-meta{padding:12px 14px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(110,168,254,.08),transparent),rgba(15,23,42,.62);font-size:12px;color:var(--muted)}.messages{padding:14px;overflow:auto;display:flex;flex-direction:column;gap:10px;min-height:0;background-image:linear-gradient(rgba(148,163,184,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(148,163,184,.04) 1px,transparent 1px);background-size:20px 20px}.message{position:relative;max-width:min(95%,540px);padding:12px 14px;border-radius:15px;border:1px solid var(--line);line-height:1.65;white-space:pre-wrap;word-break:break-word;background:rgba(15,23,42,.92)}.message::before{display:block;margin-bottom:8px;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--subtle)}.message.assistant::before{content:"助手"}.message.user::before{content:"你";color:rgba(224,231,255,.78)}.message.user{margin-left:auto;background:linear-gradient(135deg,rgba(110,168,254,.34),rgba(59,130,246,.16)),rgba(15,23,42,.98);border-color:rgba(110,168,254,.24)}.message.loading::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);animation:shimmer 1.4s linear infinite}
    .composer{padding:12px 14px;border-top:1px solid var(--line);background:var(--surface-strong)}.status-bar{padding:8px 0 0;color:#fde68a;font-size:12px;min-height:24px}.task-item{padding:10px 0;border-top:1px solid rgba(148,163,184,.12)}.task-item:first-child{padding-top:0;border-top:none}.task-title{font-size:13px;font-weight:700}.task-status{margin-top:6px;font-size:12px;color:var(--subtle)}
    @keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}@media (max-width:1180px){body{overflow:auto}.layout{grid-template-columns:minmax(260px,36vw) minmax(0,1fr);grid-template-areas:"sidebar editor" "assistant assistant";width:100%;height:auto;min-height:100vh;padding:12px}.sidebar{grid-area:sidebar}.editor{grid-area:editor;min-height:760px}.assistant{grid-area:assistant;min-height:640px}}@media (max-width:860px){.layout{grid-template-columns:1fr;grid-template-areas:"sidebar" "editor" "assistant";padding:12px;gap:12px}.panel-header,.toolbar,.section-head,.row{flex-direction:column;align-items:stretch}.panel-actions,.toolbar-actions{width:100%}.panel-actions button,.toolbar-actions button{flex:1 1 auto}.sidebar-body{grid-template-rows:auto auto}.settings-inline{grid-template-columns:1fr}.context-drawer{padding:0 12px 10px}.context-drawer-body{max-height:none}.change-browser{grid-template-columns:1fr}.changed-files{border-right:none;border-bottom:1px solid var(--line)}}
  </style>
</head>
<body>
  <div class="layout">
    <section class="panel sidebar">
      <div class="panel-header"><div class="stack"><div class="panel-title">工作区</div><div class="panel-subtitle">会话与文件树固定在左侧，便于连续切换代码上下文</div></div><div class="panel-actions"><button id="newSessionBtn" class="secondary" type="button">新建会话</button><button id="deleteSessionBtn" class="secondary" type="button">删除会话</button></div></div>
      <div class="sidebar-body">
        <div class="card sidebar-card"><div class="section-head"><h3>会话列表</h3></div><div id="sessionList" class="session-list"></div></div>
        <div class="card sidebar-card sidebar-tree-card"><div class="section-head"><h3>文件树</h3><button id="refreshTreeBtn" class="secondary" type="button">刷新</button></div><div id="workspaceMeta" class="mono">尚未选择会话</div><div id="workspaceTree" class="workspace-tree"></div></div>
      </div>
    </section>
    <section class="panel editor">
      <div class="panel-header"><div class="stack"><div class="panel-title">编辑区</div><div class="panel-subtitle">中栏聚焦代码正文，保留编辑、保存与差异对照</div></div><div class="panel-actions"><button id="reloadFileBtn" class="secondary" type="button">重新加载</button><button id="saveFileBtn" type="button">保存文件</button></div></div>
      <div class="toolbar"><div class="stack"><div id="editorTitle" class="editor-title">本地代码工作台</div><div id="editorMeta" class="panel-subtitle">左侧点击文件后会在这里加载内容</div></div><div class="toolbar-actions"><button class="secondary" type="button" data-drawer-target="settings">会话设置</button><button class="secondary" type="button" data-drawer-target="tasks">任务看板</button><button class="secondary" type="button" data-drawer-target="tests">最近测试</button><button class="secondary" type="button" data-drawer-target="eval">最近评测</button></div></div>
      <section id="contextDrawer" class="context-drawer" hidden><div class="context-drawer-frame"><div class="context-drawer-head"><div class="stack"><div id="contextDrawerTitle" class="pane-title">会话设置</div><div id="contextDrawerSubtitle" class="pane-subtitle">绑定工作区、权限和测试参数。</div></div><button id="closeDrawerBtn" class="ghost" type="button">收起</button></div><div class="context-drawer-body"><div id="drawerSettingsPanel" class="drawer-panel"><div class="settings-card"><div class="section-head settings-head"><h3>会话设置</h3><button id="saveSettingsBtn" class="secondary" type="button">保存</button></div><div class="settings-grid"><label class="field"><span class="field-label">工作区根目录</span><input id="workspaceInput" type="text" placeholder="问答模式可留空；任务模式请填写真实项目路径"><div class="workspace-picker-row"><button id="openFolderBtn" class="secondary" type="button">打开文件夹</button><button id="openFileBtn" class="secondary" type="button">打开文件</button></div></label><div class="setting-pills"><label class="toggle-chip"><input id="allowWriteInput" type="checkbox"><span>写盘</span></label><label class="toggle-chip"><input id="allowShellInput" type="checkbox"><span>命令</span></label><label class="toggle-chip"><input id="autoRunTestsInput" type="checkbox"><span>自动测试</span></label></div><div class="settings-inline"><label class="field"><span class="field-label">测试命令</span><input id="testCommandInput" type="text" placeholder="例如：python -m pytest -q"></label><label class="field"><span class="field-label">轮次</span><input id="maxTurnsInput" type="number" min="1" value="8"></label></div></div></div></div><div id="drawerTasksPanel" class="drawer-panel" hidden><div class="section-head"><h3>任务看板</h3></div><div id="taskBoard" class="empty">暂无任务</div></div><div id="drawerTestsPanel" class="drawer-panel" hidden><div class="section-head"><h3>最近一次测试</h3><button id="runTestsBtn" class="secondary" type="button">运行测试</button></div><div id="testSummary" class="empty">尚未运行测试</div></div><div id="drawerEvalPanel" class="drawer-panel" hidden><div class="section-head"><h3>最近评测</h3></div><div id="evalSummary" class="empty">尚无评测结果</div></div></div></div></section>
      <div id="fileTabs" class="file-tabs"></div>
      <div class="editor-shell">

    function fallbackDiff(A,B){const lines=[];let add=0,del=0;for(let i=0;i<Math.max(A.length,B.length);i+=1){if(A[i]===B[i]){lines.push({t:"context",l:A[i]!==undefined?i+1:"",r:B[i]!==undefined?i+1:"",s:A[i]??""});continue}if(A[i]!==undefined){lines.push({t:"removed",l:i+1,r:"",s:A[i]});del+=1}if(B[i]!==undefined){lines.push({t:"added",l:"",r:i+1,s:B[i]});add+=1}}return{lines,add,del,fallback:true}}

    function renderEditor(){const f=getActiveFile();if(!f){els.editorTitle.textContent="本地代码工作台";els.editorMeta.textContent="左侧点击文件后会在这里加载内容";els.editorStatus.textContent="尚未打开文件";els.editorEmpty.hidden=false;els.editorTextarea.hidden=true;els.editorTextarea.value="";els.editorTextarea.disabled=true;els.reloadFileBtn.disabled=true;els.saveFileBtn.disabled=true;renderDiff();return}els.editorTitle.textContent=baseName(f.path)||f.path;els.editorMeta.textContent=[f.path,f.contentHash?`校验摘要 ${f.contentHash.slice(0,12)}`:""].filter(Boolean).join(" | ");const bits=[];if(f.truncated)bits.push("文件超过读取上限，当前只读");else if(!state.currentSession?.settings?.allow_write)bits.push("当前会话未开启写权限，编辑器只读");else if(f.dirty)bits.push("存在未保存修改");else bits.push("已与磁盘同步");if(state.streamController)bits.push("助手执行中");els.editorStatus.textContent=bits.join(" | ");els.editorEmpty.hidden=true;els.editorTextarea.hidden=false;if(els.editorTextarea.value!==f.content)els.editorTextarea.value=f.content;els.editorTextarea.disabled=!canEditActiveFile();els.reloadFileBtn.disabled=!!state.streamController;els.saveFileBtn.disabled=!canSaveActiveFile();renderDiff()}
    async function refreshSessions(){state.sessions=await fetchJson("/sessions");renderSessions()}
    async function loadSession(id){if(state.streamController){setStatus("请先等待当前流式运行结束。");return}if(state.currentSession?.session_id===id)return;if(hasDirtyOpenFiles()&&!window.confirm("切换会话会丢失未保存的文件修改。是否继续？"))return;state.currentSession=await fetchJson(`/sessions/${id}`);applySessionToControls(state.currentSession);resetWorkspaceState();renderMessages(state.currentSession);renderTasks(state.currentSession.tasks);renderTestSummary(state.currentSession.last_test_summary);updateMeta();renderSessions();await refreshWorkspaceTree({skipPersist:true,silent:true})}
    async function createSession(){if(state.streamController){setStatus("请先等待当前流式运行结束。");return}const session=await fetchJson("/sessions",{method:"POST",body:JSON.stringify({workspace_root:els.workspaceInput.value.trim(),settings:sessionSettings()})});await refreshSessions();await loadSession(session.session_id);if(state.pendingPickedFilePath){const pendingPath=state.pendingPickedFilePath;state.pendingPickedFilePath="";await openFile(pendingPath,{skipPersist:true,quiet:true});setStatus(`已创建新会话并打开 ${pendingPath}`);return}setStatus("已创建新会话。")}
    async function persistCurrentControls({silent=false,refreshWorkspace=false}={}){if(!state.currentSession)throw new Error("请先创建或选择会话。");const nextRoot=els.workspaceInput.value.trim(),prevRoot=state.currentSession.workspace_root||"";if(nextRoot!==prevRoot&&hasDirtyOpenFiles()&&!window.confirm("切换工作区会丢失未保存的文件修改。是否继续？"))throw new Error("已取消切换工作区。");state.currentSession=await fetchJson(`/sessions/${state.currentSession.session_id}`,{method:"PATCH",body:JSON.stringify({workspace_root:nextRoot,settings:sessionSettings()})});await refreshSessions();renderSessions();renderTestSummary(state.currentSession.last_test_summary);updateMeta();if(refreshWorkspace||nextRoot!==prevRoot){resetWorkspaceState();await refreshWorkspaceTree({skipPersist:true,silent:true})}else{renderWorkspaceMeta();renderEditor()}if(!silent)setStatus("设置已保存。");return state.currentSession}
    async function pickLocalPath(kind){if(state.streamController){setStatus("请先等待当前流式运行结束。");return}const isFile=kind==="file";const endpoint=isFile?"/system/pick-file":"/system/pick-folder";try{setStatus(isFile?"正在打开文件选择器...":"正在打开文件夹选择器...");const payload=await fetchJson(endpoint,{method:"POST"});if(!payload.selected){setStatus("已取消选择。");return}els.workspaceInput.value=payload.workspace_root||"";renderSessions();state.pendingPickedFilePath=payload.relative_path||"";if(!state.currentSession){setStatus(isFile?`已选择 ${payload.path}。创建会话后会自动打开文件。`:`已选择工作区 ${payload.workspace_root}`);return}await persistCurrentControls({silent:true,refreshWorkspace:true});if(isFile&&payload.relative_path){await openFile(payload.relative_path,{skipPersist:true,quiet:true});state.pendingPickedFilePath="";setStatus(`已打开 ${payload.path}`);return}state.pendingPickedFilePath="";setStatus(`已选择工作区 ${payload.workspace_root}`)}catch(error){setStatus(error.message||"打开本地选择器失败。")}}
    async function refreshWorkspaceTree({skipPersist=false,silent=false}={}){if(!state.currentSession){renderWorkspaceMeta();renderWorkspaceTree();return}if(!skipPersist)await persistCurrentControls({silent:true,refreshWorkspace:false});if(!state.currentSession.workspace_root){state.workspaceEntries=[];renderWorkspaceMeta();renderWorkspaceTree();return}const payload=await fetchJson(`/sessions/${state.currentSession.session_id}/workspace/tree?path=.&depth=8&max_entries=2000`);state.workspaceEntries=payload.entries||[];for(const e of state.workspaceEntries)if(e.is_dir&&normPath(e.path).split("/").length<=1)state.expanded[e.path]=true;if(state.activeFilePath)ensureExpanded(state.activeFilePath);renderWorkspaceMeta(payload.note||"");renderWorkspaceTree();if(!silent)setStatus("已刷新文件树。")}
    async function openFile(path,{forceReload=false,skipPersist=false,quiet=false}={}){const p=normPath(path),existing=getOpenFile(p);if(existing&&!forceReload){state.activeFilePath=existing.path;ensureExpanded(existing.path);renderWorkspaceTree();renderFileTabs();renderEditor();return}if(existing?.dirty&&forceReload&&!window.confirm(`重新加载 ${existing.path} 会覆盖未保存修改。是否继续？`))return;if(!skipPersist)await persistCurrentControls({silent:true,refreshWorkspace:false});const payload=await fetchJson(`/sessions/${state.currentSession.session_id}/workspace/file?path=${encodeURIComponent(p)}`);upsertOpenFile({path:payload.path,name:baseName(payload.path),content:payload.content,originalContent:payload.content,contentHash:payload.content_sha256,dirty:false,truncated:!!payload.truncated});renderWorkspaceTree();renderFileTabs();renderEditor();if(!quiet)setStatus(payload.truncated?`已打开 ${payload.path}，但文件过大，当前只读。`:`已打开 ${payload.path}`)}
    async function reloadActiveFile(){const f=getActiveFile();if(!f){setStatus("请先打开文件。");return}await openFile(f.path,{forceReload:true})}
    async function saveActiveFile(){if(state.streamController){setStatus("请先等待当前流式运行结束。");return}const f=getActiveFile();if(!f){setStatus("请先打开文件。");return}if(f.truncated){setStatus("当前文件过大，只读展示，无法直接保存。");return}await persistCurrentControls({silent:true,refreshWorkspace:false});if(!state.currentSession?.settings?.allow_write){setStatus("请先开启“允许写盘”并保存设置。");renderEditor();return}const payload=await fetchJson(`/sessions/${state.currentSession.session_id}/workspace/file`,{method:"PUT",body:JSON.stringify({path:f.path,content:f.content,expected_content_hash:f.contentHash||undefined})});upsertOpenFile({...f,content:f.content,originalContent:f.content,contentHash:payload.content_sha256,dirty:false,truncated:false});renderFileTabs();renderEditor();await refreshWorkspaceTree({skipPersist:true,silent:true});setStatus(`已保存 ${payload.path}`)}
    function closeFileTab(path){const f=getOpenFile(path);if(f?.dirty&&!window.confirm(`关闭 ${f.path} 会丢失未保存修改。是否继续？`))return;state.openFiles=state.openFiles.filter(x=>x.path!==path);if(state.activeFilePath===path)state.activeFilePath=state.openFiles[0]?.path||"";if(state.diffTargetPath===path)state.diffTargetPath="";renderFileTabs();renderEditor();renderWorkspaceTree()}
    function appendPendingAssistant(){state.pendingAssistantText="";state.pendingAssistantEl=document.createElement("div");state.pendingAssistantEl.className="message assistant loading";state.pendingAssistantEl.textContent="处理中...";els.messages.appendChild(state.pendingAssistantEl);els.messages.scrollTop=els.messages.scrollHeight}
    function clearPendingAssistant(){state.pendingAssistantText="";if(state.pendingAssistantEl)state.pendingAssistantEl.remove();state.pendingAssistantEl=null}
    function parseSseEventBlock(block){let eventName="message";const dataLines=[];for(const raw of block.split("\n")){const line=raw.replace(/\r$/,"");if(!line||line.startsWith(":"))continue;if(line.startsWith("event:")){eventName=line.slice(6).trim()||"message";continue}if(line.startsWith("data:")){let value=line.slice(5);if(value.startsWith(" "))value=value.slice(1);dataLines.push(value)}}if(!dataLines.length)return null;return{eventName,data:dataLines.join("\n")}}
    function drainSseBuffer(buffer,flush=false){let remaining=buffer.replace(/\r\n/g,"\n");const blocks=[];while(true){const boundary=remaining.indexOf("\n\n");if(boundary===-1)break;const block=remaining.slice(0,boundary);remaining=remaining.slice(boundary+2);if(block.trim())blocks.push(block)}if(flush&&remaining.trim()){blocks.push(remaining);remaining=""}return{blocks,buffer:remaining}}
    function processSseEventBlock(block){const parsed=parseSseEventBlock(block);if(!parsed)return;let payload;try{payload=JSON.parse(parsed.data)}catch{throw new Error("流式事件解析失败。")}handleStreamEvent(parsed.eventName,payload)}
    function finalizeStream(fallbackStatus){const terminal=state.streamTerminalStatus||fallbackStatus||"";clearPendingAssistant();if(state.currentSession)renderMessages(state.currentSession);state.streamController=null;state.streamStopRequested=false;state.streamTerminalStatus="";setStreamingControls(false);renderEditor();if(terminal)setStatus(terminal)}
    function handleStreamEvent(eventName,data){if(eventName==="session"){state.currentSession=data;applySessionToControls(state.currentSession);renderMessages(state.currentSession);renderTasks(state.currentSession.tasks);renderTestSummary(state.currentSession.last_test_summary);updateMeta();refreshSessions().catch(err=>setStatus(err.message));return}if(eventName==="task_board"){if(state.currentSession)state.currentSession.tasks=data;renderTasks(data);return}if(eventName==="task_update"){if(!state.currentSession)return;const tasks=state.currentSession.tasks||[],id=data.task_id||data.id,next=tasks.map(t=>t.id===id?{...t,...data,id:t.id}:t);state.currentSession.tasks=next.some(t=>t.id===id)?next:[...next,data];renderTasks(state.currentSession.tasks);return}if(eventName==="assistant_delta"){state.pendingAssistantText+=data.content||"";if(state.pendingAssistantEl){state.pendingAssistantEl.classList.remove("loading");state.pendingAssistantEl.textContent=state.pendingAssistantText;els.messages.scrollTop=els.messages.scrollHeight}return}if(eventName==="assistant_final"){if(state.pendingAssistantEl){state.pendingAssistantEl.classList.remove("loading");state.pendingAssistantEl.textContent=data.content||state.pendingAssistantText}return}if(eventName==="test_summary"){renderTestSummary(data);return}if (eventName === "error"){clearPendingAssistant();if(state.currentSession)renderMessages(state.currentSession);setStreamTerminalStatus(data.message||"流式执行失败。")}}
    async function sendMessage(){if(state.streamController){setStatus("请先等待当前流式运行结束。");return}if(!state.currentSession){setStatus("请先创建或选择会话。");return}const content=els.messageInput.value.trim();if(!content){setStatus("请输入消息。");return}els.messageInput.value="";setStatus("保存设置并开始执行...");try{await persistCurrentControls({silent:true,refreshWorkspace:false})}catch(error){setStatus(error.message||"设置保存失败。");return}setStatus("进行中...");state.currentSession.messages=[...(state.currentSession.messages||[]),{role:"user",content}];renderMessages(state.currentSession);appendPendingAssistant();state.streamController=new AbortController();state.streamStopRequested=false;state.streamTerminalStatus="";setStreamingControls(true);try{const response=await fetch(`/sessions/${state.currentSession.session_id}/messages?stream=1`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({content}),signal:state.streamController.signal});if(!response.ok||!response.body)throw new Error(`请求失败: ${response.status}`);const reader=response.body.getReader(),decoder=new TextDecoder("utf-8");let buffer="";while(true){const {value,done}=await reader.read();if(done)break;buffer+=decoder.decode(value,{stream:true});const drained=drainSseBuffer(buffer);buffer=drained.buffer;for(const block of drained.blocks)processSseEventBlock(block)}buffer+=decoder.decode();const flushed=drainSseBuffer(buffer,true);for(const block of flushed.blocks)processSseEventBlock(block);finalizeStream("已完成。")}catch(error){if(error.name==="AbortError")setStreamTerminalStatus(state.streamTerminalStatus||(state.streamStopRequested?"已取消":"流式已中断。"));else setStreamTerminalStatus(error.message||"发送失败。");finalizeStream(state.streamTerminalStatus)}}
    async function runTests(){if(state.streamController){setStatus("请先等待当前流式运行结束。");return}if(!state.currentSession){setStatus("请先选择会话。");return}setStatus("保存设置并运行测试...");try{await persistCurrentControls({silent:true,refreshWorkspace:false});const payload=await fetchJson(`/sessions/${state.currentSession.session_id}/tests/run`,{method:"POST"});state.currentSession=payload.session;renderTestSummary(payload.summary);renderMessages(state.currentSession);renderTasks(state.currentSession.tasks);updateMeta();await refreshSessions();setStatus("测试执行完成。")}catch(error){setStatus(error.message||"测试执行失败。")}}
    async function deleteCurrentSession(){if(state.streamController){setStatus("请先等待当前流式运行结束。");return}if(!state.currentSession){setStatus("请先选择会话。");return}if(hasDirtyOpenFiles()&&!window.confirm("删除会话会丢失未保存的文件修改。是否继续？"))return;const sessionId=state.currentSession.session_id,title=state.currentSession.title||"当前会话",nextFilter=normPath(state.currentSession.workspace_root);if(!window.confirm(`确认删除会话「${title}」？此操作不可恢复。`))return;try{await fetchJson(`/sessions/${sessionId}`,{method:"DELETE"});state.currentSession=null;clearPendingAssistant();resetWorkspaceState();await refreshSessions();const nextSession=preferredSession(nextFilter);if(nextSession)await loadSession(nextSession.session_id);else{renderMessages(null);renderTasks([]);renderTestSummary(null);updateMeta()}setStatus("会话已删除。")}catch(error){setStatus(error.message||"删除会话失败。")}}
    els.editorTextarea.addEventListener("input",()=>{const f=getActiveFile();if(!f)return;f.content=els.editorTextarea.value;f.dirty=f.content!==f.originalContent;renderFileTabs();renderEditor()});
    els.workspaceInput.addEventListener("input",()=>renderSessions());
    els.newSessionBtn.addEventListener("click",()=>createSession().catch(err=>setStatus(err.message)));
    els.openFolderBtn.addEventListener("click",()=>pickLocalPath("folder"));
    els.openFileBtn.addEventListener("click",()=>pickLocalPath("file"));
    els.saveSettingsBtn.addEventListener("click",()=>persistCurrentControls({refreshWorkspace:true}).catch(err=>setStatus(err.message)));
    els.deleteSessionBtn.addEventListener("click",()=>deleteCurrentSession());
    drawerButtons.forEach(btn=>btn.addEventListener("click",()=>toggleContextDrawer(btn.dataset.drawerTarget)));
    els.closeDrawerBtn.addEventListener("click",()=>{state.drawerOpen=false;renderContextDrawer()});
    els.sendBtn.addEventListener("click",()=>sendMessage());
    els.runTestsBtn.addEventListener("click",()=>runTests());
    els.refreshTreeBtn.addEventListener("click",()=>refreshWorkspaceTree().catch(err=>setStatus(err.message)));
    els.reloadFileBtn.addEventListener("click",()=>reloadActiveFile().catch(err=>setStatus(err.message)));
    els.saveFileBtn.addEventListener("click",()=>saveActiveFile().catch(err=>setStatus(err.message)));
    els.stopBtn.addEventListener("click",()=>{if(!state.streamController)return;state.streamStopRequested=true;clearPendingAssistant();if(state.currentSession)renderMessages(state.currentSession);setStreamTerminalStatus("已取消");state.streamController.abort()});
    renderContextDrawer();setStreamingControls(false);renderWorkspaceMeta();renderWorkspaceTree();renderFileTabs();renderEditor();
    Promise.all([refreshSessions(),fetchJson("/eval/latest").then(renderEval)]).then(async()=>{const nextSession=preferredSession();if(nextSession)await loadSession(nextSession.session_id);else updateMeta()}).catch(err=>setStatus(err.message));
  </script>
