<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CodeInsight-Agent Web</title>
  <style>
    :root{color-scheme:dark;--bg:#0b0f1a;--bg2:#0f172a;--surface:rgba(15,23,42,.88);--text:#e5e7eb;--muted:#9ca3af;--subtle:#64748b;--line:rgba(148,163,184,.16);--line2:rgba(148,163,184,.3);--accent:rgba(110,168,254,.16);--warn:#f59e0b;--ok:#34d399;--err:#f87171;--sidebar-width:clamp(240px,18vw,300px);--assistant-width:clamp(320px,24vw,420px)}
    *{box-sizing:border-box}html,body{width:100%;height:100%;min-height:100%}body{margin:0;width:100vw;height:100vh;overflow:hidden;font-family:"SF Pro Display","Segoe UI Variable","PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(59,130,246,.14),transparent 28%),radial-gradient(circle at bottom right,rgba(16,185,129,.08),transparent 26%),linear-gradient(180deg,var(--bg),var(--bg2) 56%,#111827)}
    button,input,textarea{font:inherit;color:inherit;appearance:none}button:focus-visible,input:focus-visible,textarea:focus-visible{outline:none;box-shadow:0 0 0 4px rgba(110,168,254,.16);border-color:rgba(110,168,254,.64)}
    .layout{display:flex;align-items:stretch;gap:12px;width:100vw;height:100vh;min-height:100vh;padding:12px}

    .panel-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:18px;border-bottom:1px solid var(--line)}
    .panel-title{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--subtle)}.panel-subtitle{font-size:13px;line-height:1.6;color:var(--muted)}.stack{display:flex;flex-direction:column;gap:6px}.sidebar>.panel-header{position:relative;z-index:3;flex-wrap:wrap;overflow:visible}.sidebar>.panel-header>.row{margin-left:auto;flex:0 0 auto;position:relative;z-index:4}.sidebar>.panel-header>.row button{flex:1 1 auto;min-width:max-content}
    .scroll{padding:14px;overflow:auto;display:flex;flex-direction:column;gap:14px;min-height:0}.sidebar,.assistant{display:flex;flex-direction:column;min-height:0}.sidebar{flex:0 0 var(--sidebar-width)}.sidebar .scroll{position:relative;z-index:1}.assistant{flex:0 0 var(--assistant-width)}.editor{flex:1 1 auto;display:grid;grid-template-rows:auto auto auto minmax(0,1fr);min-width:0;min-height:0}
    .card{background:rgba(15,23,42,.7);border:1px solid var(--line);border-radius:18px;padding:16px}.section-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}.section-head h3{margin:0;font-size:16px}
    .row{display:flex;gap:10px;align-items:center}.row>*{flex:1}.session-list{display:flex;flex-direction:column;gap:12px;max-height:360px;overflow:auto}.session-group{display:flex;flex-direction:column;gap:8px}.session-group-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}.session-group-title{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--subtle)}.session-group-note{font-size:12px;line-height:1.5;color:var(--muted)}.session-card{padding:12px 14px;border-radius:14px;border:1px solid transparent;background:rgba(148,163,184,.05);cursor:pointer}.session-card:hover{border-color:var(--line2)}.session-card.active{background:var(--accent);border-color:rgba(110,168,254,.34)}.session-title{font-weight:700;margin-bottom:6px}.session-meta{font-size:12px;line-height:1.6;color:var(--muted)}
    .mono,.empty,.task-summary{font-size:13px;line-height:1.7;color:var(--muted);white-space:pre-wrap;word-break:break-word}.mono{padding:10px 12px;border-radius:12px;background:rgba(148,163,184,.06);border:1px solid rgba(148,163,184,.12)}.empty{padding:14px;border-radius:14px;border:1px dashed rgba(148,163,184,.18);background:rgba(148,163,184,.04)}
    button{border:1px solid transparent;border-radius:12px;background:linear-gradient(135deg,rgba(110,168,254,.88),rgba(96,165,250,.68));color:#eff6ff;padding:10px 14px;font-weight:700;cursor:pointer}button:disabled{opacity:.48;cursor:not-allowed}button.secondary{background:rgba(15,23,42,.72);border-color:var(--line);color:var(--text)}button.warn{background:linear-gradient(135deg,rgba(245,158,11,.84),rgba(217,119,6,.7));color:#fff7ed}button.ghost{background:transparent;border:none;padding:4px 6px;color:var(--muted)}
    textarea,input[type="text"],input[type="number"]{width:100%;border:1px solid rgba(148,163,184,.14);border-radius:14px;padding:12px 14px;background:rgba(15,23,42,.72);color:var(--text)}textarea::placeholder,input::placeholder{color:var(--subtle)}textarea{min-height:110px;resize:vertical}
    .toggle{display:flex;justify-content:space-between;align-items:center;gap:12px;margin:12px 0;padding:12px 14px;border-radius:14px;border:1px solid rgba(148,163,184,.12);background:rgba(148,163,184,.04);font-size:13px}
    input[type="checkbox"]{position:relative;width:42px;height:24px;border-radius:999px;border:1px solid rgba(148,163,184,.28);background:rgba(15,23,42,.92);cursor:pointer}input[type="checkbox"]::before{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:999px;background:#94a3b8;transition:transform .18s ease}input[type="checkbox"]:checked{border-color:rgba(110,168,254,.46);background:rgba(110,168,254,.22)}input[type="checkbox"]:checked::before{transform:translateX(18px);background:#eff6ff}
    .workspace-tree{display:flex;flex-direction:column;gap:4px;flex:1;min-height:0;overflow:auto;padding-right:4px}.tree-node{display:flex;flex-direction:column;gap:4px}.tree-row{display:flex;align-items:center;gap:4px;min-height:32px;padding:0 6px;border-radius:10px;border:1px solid transparent}.tree-row:hover{background:rgba(148,163,184,.06)}.tree-row.active{background:var(--accent);border-color:rgba(110,168,254,.24)}.tree-toggle,.tree-spacer{flex:0 0 18px;width:18px;height:18px;display:grid;place-items:center;text-align:center}.tree-toggle{background:transparent;border:none;padding:0;border-radius:6px;color:var(--subtle)}.tree-toggle:hover{background:rgba(148,163,184,.12);color:var(--text)}.tree-action{flex:1;display:flex;align-items:center;justify-content:space-between;gap:10px;min-width:0;padding:6px 0;background:transparent;border:none;text-align:left;color:var(--text)}.tree-main{display:flex;align-items:center;gap:10px;min-width:0}.tree-children{display:flex;flex-direction:column;gap:4px;margin-left:16px;padding-left:10px;border-left:1px solid rgba(148,163,184,.12)}.tree-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.tree-meta{flex:0 0 auto;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--subtle)}.tree-icon{position:relative;flex:0 0 16px;width:16px;height:16px}.tree-icon.folder::before{content:"";position:absolute;left:1px;top:4px;width:14px;height:10px;border:1px solid rgba(96,165,250,.5);border-radius:4px;background:rgba(59,130,246,.18)}.tree-icon.folder::after{content:"";position:absolute;left:2px;top:1px;width:7px;height:4px;border:1px solid rgba(96,165,250,.44);border-bottom:none;border-radius:3px 3px 0 0;background:rgba(96,165,250,.2)}.tree-icon.folder.open::before{border-color:rgba(250,204,21,.48);background:rgba(250,204,21,.18)}.tree-icon.folder.open::after{border-color:rgba(250,204,21,.44);background:rgba(250,204,21,.2)}.tree-icon.file::before{content:"";position:absolute;left:2px;top:1px;width:11px;height:14px;border:1px solid rgba(148,163,184,.38);border-radius:3px;background:rgba(148,163,184,.12)}.tree-icon.file::after{content:"";position:absolute;top:2px;left:9px;width:4px;height:4px;border-top:1px solid rgba(148,163,184,.38);border-right:1px solid rgba(148,163,184,.38);background:rgba(148,163,184,.22);transform:skew(-10deg,-10deg)}
    .toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line)}.editor-title{font-size:22px;font-weight:700}.file-tabs{display:flex;gap:8px;padding:12px 18px;overflow:auto;border-bottom:1px solid var(--line);background:rgba(15,23,42,.46)}.file-tab{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:12px;border:1px solid rgba(148,163,184,.14);background:rgba(15,23,42,.72);cursor:pointer;color:var(--muted)}.file-tab.active{background:var(--accent);border-color:rgba(110,168,254,.28);color:var(--text)}.file-tab.dirty .file-name::after{content:" •";color:var(--warn)}.file-name{max-width:160px;overflow:hidden;text-overflow:ellipsis}
    .editor-shell{display:grid;grid-template-rows:minmax(0,1fr) 240px;gap:14px;padding:14px 18px 18px;min-height:0}.pane{display:flex;flex-direction:column;min-height:0;border:1px solid var(--line);border-radius:18px;background:rgba(15,23,42,.72);overflow:hidden}.pane-head{padding:14px 16px;border-bottom:1px solid var(--line)}.pane-title{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--subtle)}.pane-subtitle{font-size:13px;line-height:1.6;color:var(--muted);white-space:pre-wrap;word-break:break-word}.editor-empty{margin:16px}.editor-textarea{flex:1;min-height:0;border:none;padding:16px;background:transparent;resize:none;font-family:"Cascadia Code","SFMono-Regular",Consolas,monospace;font-size:14px;line-height:1.7}.editor-textarea[disabled]{color:var(--muted);cursor:not-allowed}
    .diff-view{flex:1;min-height:0;overflow:auto;font-family:"Cascadia Code","SFMono-Regular",Consolas,monospace;font-size:13px;line-height:1.6}.diff-line{display:grid;grid-template-columns:74px 1fr;gap:10px;padding:5px 14px;border-bottom:1px solid rgba(148,163,184,.08);white-space:pre-wrap;word-break:break-word}.diff-line.context{color:var(--muted)}.diff-line.added{background:rgba(52,211,153,.12);color:#d1fae5}.diff-line.removed{background:rgba(248,113,113,.12);color:#fee2e2}.diff-no{color:var(--subtle)}
    .chat-card{display:grid;grid-template-rows:auto minmax(240px,1fr) auto;min-height:520px;padding:0;overflow:hidden}.chat-meta{padding:16px 18px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(110,168,254,.08),transparent),rgba(15,23,42,.56);font-size:13px;color:var(--muted)}.messages{padding:18px;overflow:auto;display:flex;flex-direction:column;gap:14px;min-height:0;background-image:linear-gradient(rgba(148,163,184,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(148,163,184,.04) 1px,transparent 1px);background-size:24px 24px}.message{position:relative;max-width:min(92%,540px);padding:14px 16px;border-radius:18px;border:1px solid var(--line);line-height:1.7;white-space:pre-wrap;word-break:break-word;background:rgba(15,23,42,.92)}.message::before{display:block;margin-bottom:8px;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--subtle)}.message.assistant::before{content:"助手"}.message.user::before{content:"你";color:rgba(224,231,255,.78)}.message.user{margin-left:auto;background:linear-gradient(135deg,rgba(110,168,254,.34),rgba(59,130,246,.16)),rgba(15,23,42,.98);border-color:rgba(110,168,254,.24)}.message.loading::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);animation:shimmer 1.4s linear infinite}
    .composer{padding:16px;border-top:1px solid var(--line);background:rgba(15,23,42,.88)}.status-bar{padding:8px 2px 2px;color:#fde68a;font-size:13px;min-height:26px}.task-item{padding:12px 0;border-top:1px solid rgba(148,163,184,.12)}.task-item:first-child{padding-top:0;border-top:none}.task-title{font-size:14px;font-weight:700}.task-status{margin-top:6px;font-size:12px;color:var(--subtle)}
    @keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}@media (max-width:1280px){body{overflow:auto}.layout{flex-direction:column;width:100%;height:auto;min-height:100vh;padding:16px}.sidebar,.assistant,.editor{flex:0 0 auto;width:100%}}@media (max-width:860px){.layout{padding:12px;gap:12px}.panel-header,.toolbar,.section-head,.row{flex-direction:column;align-items:stretch}}
  </style>
</head>
<body>
  <div class="layout">
    <section class="panel sidebar">
      <div class="panel-header"><div class="stack"><div class="panel-title">工作区</div><div class="panel-subtitle">会话、文件树和多文件切换</div></div><div class="row" style="flex:0 0 auto"><button id="newSessionBtn" class="secondary" type="button">新建会话</button><button id="deleteSessionBtn" class="secondary" type="button">删除会话</button></div></div>
      <div class="scroll">
        <div class="card"><div class="section-head"><h3>会话列表</h3></div><div id="sessionList" class="session-list"></div></div>
        <div class="card"><div class="section-head"><h3>文件树</h3><button id="refreshTreeBtn" class="secondary" type="button">刷新</button></div><div id="workspaceMeta" class="mono">尚未选择会话</div><div id="workspaceTree" class="workspace-tree" style="margin-top:12px"></div></div>
      </div>
    </section>
    <section class="panel editor">
      <div class="panel-header"><div class="stack"><div class="panel-title">编辑区</div><div class="panel-subtitle">查看、编辑、保存并展示差异</div></div><div class="row" style="flex:0 0 auto"><button id="reloadFileBtn" class="secondary" type="button">重新加载</button><button id="saveFileBtn" type="button">保存文件</button></div></div>
      <div class="toolbar"><div class="stack"><div id="editorTitle" class="editor-title">本地代码工作台</div><div id="editorMeta" class="panel-subtitle">左侧点击文件后会在这里加载内容</div></div></div>
      <div id="fileTabs" class="file-tabs"></div>
      <div class="editor-shell">
        <div class="pane"><div class="pane-head"><div class="pane-title">编辑器</div><div id="editorStatus" class="pane-subtitle">尚未打开文件</div></div><div id="editorEmpty" class="empty editor-empty">点击左侧文件树中的文件开始查看或编辑。支持多文件标签切换。</div><textarea id="editorTextarea" class="editor-textarea" spellcheck="false" hidden></textarea></div>
        <div class="pane"><div class="pane-head"><div class="pane-title">变更对比</div><div id="diffSummary" class="pane-subtitle">暂无变更</div></div><div id="diffView" class="diff-view"></div></div>
      </div>
    </section>
    <aside class="panel assistant">
      <div class="panel-header"><div class="stack"><div class="panel-title">智能助手</div><div class="panel-subtitle">对话驱动修改，并保留任务、测试和评测信息</div></div></div>
      <div class="scroll">
        <div class="card chat-card"><div id="chatMeta" class="chat-meta">尚未选择会话</div><div id="messages" class="messages"></div><div class="composer"><textarea id="messageInput" placeholder="输入你的目标，例如：分析登录模块并修改错误处理，然后补充最小测试。"></textarea><div class="row" style="margin-top:10px"><button id="sendBtn" type="button">发送任务</button><button id="stopBtn" class="warn" type="button">停止流式</button></div><div id="statusBar" class="status-bar"></div></div></div>
        <div class="card"><div class="section-head"><h3>会话设置</h3><button id="saveSettingsBtn" class="secondary" type="button">保存设置</button></div><div class="mono" style="margin-bottom:8px">工作区根目录</div><input id="workspaceInput" type="text" placeholder="问答模式可留空；任务模式请填写真实项目路径"><div class="toggle"><span>允许写盘</span><input id="allowWriteInput" type="checkbox"></div><div class="toggle"><span>允许命令执行</span><input id="allowShellInput" type="checkbox"></div><div class="toggle"><span>自动运行测试</span><input id="autoRunTestsInput" type="checkbox"></div><div class="mono" style="margin:12px 0 8px">测试命令</div><input id="testCommandInput" type="text" placeholder="例如：python -m pytest -q"><div class="mono" style="margin:12px 0 8px">最大工具轮次</div><input id="maxTurnsInput" type="number" min="1" value="8"></div>
        <div class="card"><div class="section-head"><h3>任务看板</h3></div><div id="taskBoard" class="empty">暂无任务</div></div>
        <div class="card"><div class="section-head"><h3>最近一次测试</h3><button id="runTestsBtn" class="secondary" type="button">运行测试</button></div><div id="testSummary" class="empty">尚未运行测试</div></div>
        <div class="card"><div class="section-head"><h3>最近评测</h3></div><div id="evalSummary" class="empty">尚无评测结果</div></div>
      </div>
    </aside>
  </div>
  <script>
    const state={sessions:[],currentSession:null,streamController:null,streamStopRequested:false,streamTerminalStatus:"",pendingAssistantEl:null,pendingAssistantText:"",workspaceEntries:[],expanded:{".":true},openFiles:[],activeFilePath:""};
    const $=id=>document.getElementById(id);
    const els={sessionList:$("sessionList"),workspaceMeta:$("workspaceMeta"),workspaceTree:$("workspaceTree"),refreshTreeBtn:$("refreshTreeBtn"),fileTabs:$("fileTabs"),editorTitle:$("editorTitle"),editorMeta:$("editorMeta"),editorStatus:$("editorStatus"),editorEmpty:$("editorEmpty"),editorTextarea:$("editorTextarea"),diffSummary:$("diffSummary"),diffView:$("diffView"),reloadFileBtn:$("reloadFileBtn"),saveFileBtn:$("saveFileBtn"),messages:$("messages"),taskBoard:$("taskBoard"),testSummary:$("testSummary"),evalSummary:$("evalSummary"),chatMeta:$("chatMeta"),statusBar:$("statusBar"),sendBtn:$("sendBtn"),stopBtn:$("stopBtn"),runTestsBtn:$("runTestsBtn"),saveSettingsBtn:$("saveSettingsBtn"),newSessionBtn:$("newSessionBtn"),deleteSessionBtn:$("deleteSessionBtn"),messageInput:$("messageInput"),workspaceInput:$("workspaceInput"),allowWriteInput:$("allowWriteInput"),allowShellInput:$("allowShellInput"),autoRunTestsInput:$("autoRunTestsInput"),testCommandInput:$("testCommandInput"),maxTurnsInput:$("maxTurnsInput")};
    const sendBtnEl=els.sendBtn,runTestsBtnEl=els.runTestsBtn,saveSettingsBtnEl=els.saveSettingsBtn;
    function setStatus(t){els.statusBar.textContent=t||""}
    function setStreamTerminalStatus(text){state.streamTerminalStatus=text||"";if(state.streamTerminalStatus)setStatus(state.streamTerminalStatus)}
    function escapeHtml(t){return String(t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
    function formatWorkspaceLabel(v){return v||"问答模式 / 未配置工作区"}
    function formatTimestamp(v){if(!v)return"未知时间";const d=new Date(v);return Number.isNaN(d.getTime())?String(v):d.toLocaleString("zh-CN",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"})}
    function normPath(v){return String(v||"").replace(/\\/g,"/").replace(/^\.\/+/,"")}
    function baseName(v){const p=normPath(v).split("/");return p[p.length-1]||v}
    function sessionSettings(){return{allow_write:els.allowWriteInput.checked,allow_shell:els.allowShellInput.checked,auto_run_tests:els.autoRunTestsInput.checked,test_command:els.testCommandInput.value.trim(),max_turns:Number(els.maxTurnsInput.value||8)}}
    function applySessionToControls(s){const st=s?.settings||{};els.workspaceInput.value=s?.workspace_root||"";els.allowWriteInput.checked=!!st.allow_write;els.allowShellInput.checked=!!st.allow_shell;els.autoRunTestsInput.checked=!!st.auto_run_tests;els.testCommandInput.value=st.test_command||"";els.maxTurnsInput.value=st.max_turns||8}
    function getOpenFile(path){return state.openFiles.find(f=>f.path===normPath(path))||null}
    function getActiveFile(){return getOpenFile(state.activeFilePath)}
    function canEditActiveFile(){const f=getActiveFile();return !!f&&!!state.currentSession?.settings?.allow_write&&!f.truncated&&!state.streamController}
    function canSaveActiveFile(){const f=getActiveFile();return !!f&&f.dirty&&canEditActiveFile()}
    function hasDirtyOpenFiles(){return state.openFiles.some(f=>f.dirty)}
    function ensureExpanded(path){const parts=normPath(path).split("/");let cur="";for(let i=0;i<parts.length-1;i+=1){cur=cur?`${cur}/${parts[i]}`:parts[i];state.expanded[cur]=true}}
    function upsertOpenFile(file){const idx=state.openFiles.findIndex(x=>x.path===file.path);if(idx>=0)state.openFiles[idx]={...state.openFiles[idx],...file};else state.openFiles.push(file);state.activeFilePath=file.path;ensureExpanded(file.path)}
    function setStreamingControls(busy){sendBtnEl.disabled = busy;runTestsBtnEl.disabled = busy;saveSettingsBtnEl.disabled = busy;els.newSessionBtn.disabled=busy;els.deleteSessionBtn.disabled=busy;els.messageInput.disabled=busy;els.refreshTreeBtn.disabled=busy;els.stopBtn.disabled=!busy;els.reloadFileBtn.disabled=busy||!getActiveFile();els.saveFileBtn.disabled=busy||!canSaveActiveFile();renderEditor()}
    async function fetchJson(url,options={}){const res=await fetch(url,{headers:{"Content-Type":"application/json"},...options});if(!res.ok){const body=await res.json().catch(()=>({}));throw new Error(body.detail||`请求失败: ${res.status}`)}return res.json()}
    function updateMeta(){els.chatMeta.textContent=!state.currentSession?"尚未选择会话":`${state.currentSession.title} | ${formatWorkspaceLabel(state.currentSession.workspace_root)}`}
    function resetWorkspaceState(){state.workspaceEntries=[];state.expanded={".":true};state.openFiles=[];state.activeFilePath="";renderWorkspaceMeta();renderWorkspaceTree();renderFileTabs();renderEditor()}
    function currentWorkspaceFilter(){return normPath(els.workspaceInput.value.trim()||state.currentSession?.workspace_root||"")}
    function sessionsForWorkspace(workspaceRoot){const root=normPath(workspaceRoot);return state.sessions.filter(s=>normPath(s.workspace_root)===root)}
    function qaSessions(){return state.sessions.filter(s=>!normPath(s.workspace_root))}
    function preferredSession(filterRoot=currentWorkspaceFilter()){const scoped=filterRoot?sessionsForWorkspace(filterRoot):qaSessions();return scoped[0]||state.sessions[0]||null}
    function renderSessionCards(items,{emptyText,showWorkspace=false}={}){if(!items.length)return`<div class="empty">${escapeHtml(emptyText||"暂无会话")}</div>`;return items.map(s=>`<div class="session-card ${state.currentSession?.session_id===s.session_id?"active":""}" data-session-id="${s.session_id}"><div class="session-title">${escapeHtml(s.title)}</div><div class="session-meta">${escapeHtml(formatTimestamp(s.updated_at))}</div>${showWorkspace?`<div class="session-meta">${escapeHtml(formatWorkspaceLabel(s.workspace_root))}</div>`:""}</div>`).join("")}
    function renderSessionGroup(title,note,items,{emptyText,showWorkspace=false}={}){return`<section class="session-group"><div class="session-group-head"><div><div class="session-group-title">${escapeHtml(title)}</div><div class="session-group-note">${escapeHtml(note)}</div></div></div>${renderSessionCards(items,{emptyText,showWorkspace})}</section>`}
    function renderSessions(){

    els.sendBtn.addEventListener("click",()=>sendMessage());
    els.runTestsBtn.addEventListener("click",()=>runTests());
    els.refreshTreeBtn.addEventListener("click",()=>refreshWorkspaceTree().catch(err=>setStatus(err.message)));
    els.reloadFileBtn.addEventListener("click",()=>reloadActiveFile().catch(err=>setStatus(err.message)));
    els.saveFileBtn.addEventListener("click",()=>saveActiveFile().catch(err=>setStatus(err.message)));
    els.stopBtn.addEventListener("click",()=>{if(!state.streamController)return;state.streamStopRequested=true;clearPendingAssistant();if(state.currentSession)renderMessages(state.currentSession);setStreamTerminalStatus("已取消");state.streamController.abort()});
    setStreamingControls(false);renderWorkspaceMeta();renderWorkspaceTree();renderFileTabs();renderEditor();
    Promise.all([refreshSessions(),fetchJson("/eval/latest").then(renderEval)]).then(async()=>{const nextSession=preferredSession();if(nextSession)await loadSession(nextSession.session_id);else updateMeta()}).catch(err=>setStatus(err.message));
  </script>
</body>
</html>
