<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CodeInsight-Agent Web</title>
  <style>
    :root{
      color-scheme:dark;
      --bg:#0b0f1a;
      --bg2:#0f172a;
      --surface:rgba(15,23,42,.88);
      --surface-strong:rgba(15,23,42,.96);
      --text:#e5e7eb;
      --muted:#9ca3af;
      --subtle:#64748b;
      --line:rgba(148,163,184,.16);
      --line2:rgba(148,163,184,.3);
      --accent:rgba(110,168,254,.16);
      --warn:#f59e0b;
      --ok:#34d399;
      --err:#f87171;
      --panel-radius:18px;
      --card-radius:14px;
      --control-radius:10px;
      --shadow:0 18px 48px rgba(2,6,23,.32);
      --layout-gap:10px;
      --sidebar-width:clamp(220px,16vw,280px);
      --assistant-width:clamp(300px,20vw,380px);
    }

    *{box-sizing:border-box}
    html,body{width:100%;height:100%;min-height:100%}
    body{
      margin:0;
      width:100%;
      min-height:100vh;
      overflow:hidden;
      font-family:"SF Pro Display","Segoe UI Variable","PingFang SC","Microsoft YaHei",sans-serif;
      line-height:1.5;
      -webkit-font-smoothing:antialiased;
      color:var(--text);
      background:
        radial-gradient(circle at top left,rgba(59,130,246,.14),transparent 28%),
        radial-gradient(circle at bottom right,rgba(16,185,129,.08),transparent 26%),
        linear-gradient(180deg,var(--bg),var(--bg2) 56%,#111827);
    }

    button,input,textarea{font:inherit;color:inherit;appearance:none}
    button:focus-visible,input:focus-visible,textarea:focus-visible,summary:focus-visible{
      outline:none;
      box-shadow:0 0 0 4px rgba(110,168,254,.16);
      border-color:rgba(110,168,254,.64);
    }

    .layout{
      display:grid;
      grid-template-columns:var(--sidebar-width) minmax(0,1fr) var(--assistant-width);
      align-items:stretch;
      gap:var(--layout-gap);
      width:100%;
      height:100vh;
      min-height:100vh;
      padding:var(--layout-gap);
    }
    .layout.left-collapsed{grid-template-columns:0 minmax(0,1fr) var(--assistant-width)}
    .layout.right-collapsed{grid-template-columns:var(--sidebar-width) minmax(0,1fr) 0}
    .layout.both-collapsed{grid-template-columns:0 minmax(0,1fr) 0}
    .layout.left-collapsed .sidebar,
    .layout.right-collapsed .assistant,
    .layout.both-collapsed .sidebar,
    .layout.both-collapsed .assistant{display:none}

    .panel{
      display:flex;
      flex-direction:column;
      min-width:0;
      min-height:0;
      background:linear-gradient(180deg,rgba(255,255,255,.03),transparent 20%),var(--surface);
      border:1px solid var(--line);
      border-radius:var(--panel-radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .sidebar,.assistant,.editor,.sidebar-body,.sidebar-card,.session-list,.workspace-tree,.tree-node,.tree-row,.tree-action,.tree-main,.tree-children,.session-card,.session-title,.session-meta{min-width:0}
    .panel-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-bottom:1px solid var(--line);
      background:rgba(15,23,42,.42);
    }
    .panel-title{
      font-size:10px;
      font-weight:700;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--subtle);
    }
    .panel-subtitle{
      font-size:11px;
      line-height:1.45;
      color:var(--muted);
      min-width:0;
    }
    .stack{display:flex;flex-direction:column;gap:3px;min-width:0}
    .panel-actions{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .panel-actions button{flex:0 0 auto}

    .sidebar{display:grid;grid-template-rows:auto minmax(0,1fr)}
    .sidebar-body{
      display:grid;
      grid-template-rows:minmax(200px,.72fr) minmax(0,1fr);
      gap:10px;
      padding:10px;
      min-height:0;
    }
    .sidebar-card{display:flex;flex-direction:column;gap:10px;padding:10px 12px;min-height:0;overflow:hidden}
    .sidebar-tree-card{min-height:0}

    .editor{
      display:grid;
      grid-template-rows:auto auto auto auto minmax(0,1fr);
      min-width:0;
      min-height:0;
    }
    .assistant{
      display:grid;
      grid-template-rows:auto minmax(0,1fr);
      min-width:0;
      min-height:0;
    }

    .card{
      background:rgba(15,23,42,.76);
      border:1px solid var(--line);
      border-radius:var(--card-radius);
      padding:12px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.02);
    }
    .section-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px;min-width:0}
    .section-head h3{
      margin:0;
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      font-size:13px;
    }
    .row{display:flex;gap:8px;align-items:center}
    .row>*{flex:1}

    .mono,.empty,.task-summary{
      font-size:12px;
      line-height:1.65;
      color:var(--muted);
      white-space:pre-wrap;
      word-break:break-word;
    }
    .mono{
      padding:8px 10px;
      border-radius:var(--control-radius);
      background:rgba(148,163,184,.06);
      border:1px solid rgba(148,163,184,.12);
    }
    .empty{
      padding:12px;
      border-radius:var(--card-radius);
      border:1px dashed rgba(148,163,184,.18);
      background:rgba(148,163,184,.04);
    }

    button{
      border:1px solid transparent;
      border-radius:var(--control-radius);
      background:linear-gradient(135deg,rgba(110,168,254,.9),rgba(59,130,246,.72));
      color:#eff6ff;
      padding:6px 10px;
      font-size:11px;
      font-weight:700;
      cursor:pointer;
      box-shadow:0 8px 20px rgba(37,99,235,.18);
    }
    button:disabled{opacity:.48;cursor:not-allowed;box-shadow:none}
    button.secondary{
      background:rgba(15,23,42,.72);
      border-color:var(--line);
      color:var(--text);
    }
    button.warn{
      background:linear-gradient(135deg,rgba(245,158,11,.84),rgba(217,119,6,.7));
      color:#fff7ed;
    }
    button.danger{
      background:linear-gradient(135deg,rgba(239,68,68,.92),rgba(185,28,28,.78));
      color:#fff1f2;
    }
    button.ghost{
      background:transparent;
      border:none;
      padding:2px 4px;
      color:var(--muted);
      box-shadow:none;
    }
    button.active{background:var(--accent);border-color:rgba(110,168,254,.28);color:var(--text)}

    textarea,input[type="text"],input[type="number"]{
      width:100%;
      border:1px solid rgba(148,163,184,.14);
      border-radius:var(--control-radius);
      padding:10px 12px;
      background:rgba(15,23,42,.72);
      color:var(--text);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.02);
    }
    textarea::placeholder,input::placeholder{color:var(--subtle)}
    textarea{min-height:108px;resize:vertical}

    .settings-card{display:flex;flex-direction:column;gap:12px}
    .settings-grid{display:grid;gap:12px}
    .field{display:flex;flex-direction:column;gap:8px}
    .field-label{
      font-size:10px;
      font-weight:700;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--subtle);
    }
    .workspace-picker-row{display:flex;gap:8px;flex-wrap:wrap}
    .settings-inline{display:grid;grid-template-columns:minmax(0,1fr) 92px;gap:10px}
    .setting-pills{display:flex;flex-wrap:wrap;gap:8px}
    .toggle-chip{position:relative;display:inline-flex}
    .toggle-chip input{position:absolute;opacity:0;pointer-events:none}
    .toggle-chip span{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,.16);
      background:rgba(148,163,184,.05);
      font-size:11px;
      font-weight:700;
      color:var(--muted);
      cursor:pointer;
      transition:background .16s ease,border-color .16s ease,color .16s ease;
    }
    .toggle-chip span::before{
      content:"";
      width:8px;
      height:8px;
      border-radius:999px;
      background:var(--subtle);
    }
    .toggle-chip input:checked+span{
      background:var(--accent);
      border-color:rgba(110,168,254,.28);
      color:var(--text);
    }
    .toggle-chip input:checked+span::before{background:#93c5fd}

    .session-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      min-height:0;
      overflow:auto;
      overflow-x:hidden;
      padding-right:2px;
    }
    .session-group{display:flex;flex-direction:column;gap:8px}
    .session-group-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
    .session-group-title{
      font-size:10px;
      font-weight:700;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--subtle);
    }
    .session-group-note{font-size:11px;line-height:1.45;color:var(--muted)}
    .session-card{
      padding:9px 10px;
      border-radius:12px;
      border:1px solid transparent;
      background:rgba(148,163,184,.05);
      cursor:pointer;
      overflow:hidden;
    }
    .session-card:hover{border-color:var(--line2)}
    .session-card.active{background:var(--accent);border-color:rgba(110,168,254,.34)}
    .session-title{
      font-weight:700;
      margin-bottom:4px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .session-meta{
      font-size:11px;
      line-height:1.55;
      color:var(--muted);
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .workspace-tree{
      display:flex;
      flex-direction:column;
      gap:2px;
      flex:1;
      min-height:0;
      overflow:auto;
      overflow-x:hidden;
      padding-right:2px;
    }
    .tree-node,.tree-children{display:flex;flex-direction:column;gap:2px;overflow:hidden}
    .tree-row{
      display:flex;
      align-items:center;
      gap:4px;
      min-height:28px;
      padding:0 4px;
      border-radius:8px;
      border:1px solid transparent;
      overflow:hidden;
    }
    .tree-row:hover{background:rgba(148,163,184,.06)}
    .tree-row.active{background:var(--accent);border-color:rgba(110,168,254,.24)}
    .tree-toggle,.tree-spacer{
      flex:0 0 18px;
      width:18px;
      height:18px;
      display:grid;
      place-items:center;
      text-align:center;
    }
    .tree-toggle{
      background:transparent;
      border:none;
      padding:0;
      border-radius:6px;
      color:var(--subtle);
      box-shadow:none;
    }
    .tree-toggle:hover{background:rgba(148,163,184,.12);color:var(--text)}
    .tree-action{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      min-width:0;
      padding:4px 0;
      background:transparent;
      border:none;
      text-align:left;
      color:var(--text);
      box-shadow:none;
    }
    .tree-main{display:flex;align-items:center;gap:8px;min-width:0}
    .tree-children{margin-left:12px;padding-left:8px;border-left:1px solid rgba(148,163,184,.12)}
    .tree-name{
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .tree-meta{
      flex:0 0 auto;
      font-size:9px;
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--subtle);
    }
    .tree-icon{position:relative;flex:0 0 16px;width:16px;height:16px}
    .tree-icon.folder::before{
      content:"";
      position:absolute;
      left:1px;
      top:4px;
      width:14px;
      height:10px;
      border:1px solid rgba(96,165,250,.5);
      border-radius:4px;
      background:rgba(59,130,246,.18);
    }
    .tree-icon.folder::after{
      content:"";
      position:absolute;
      left:2px;
      top:1px;
      width:7px;
      height:4px;
      border:1px solid rgba(96,165,250,.44);
      border-bottom:none;
      border-radius:3px 3px 0 0;
      background:rgba(96,165,250,.2);
    }
    .tree-icon.folder.open::before{
      border-color:rgba(250,204,21,.48);
      background:rgba(250,204,21,.18);
    }
    .tree-icon.folder.open::after{
      border-color:rgba(250,204,21,.44);
      background:rgba(250,204,21,.2);
    }
    .tree-icon.file::before{
      content:"";
      position:absolute;
      left:2px;
      top:1px;
      width:11px;
      height:14px;
      border:1px solid rgba(148,163,184,.38);
      border-radius:3px;
      background:rgba(148,163,184,.12);
    }
    .tree-icon.file::after{
      content:"";
      position:absolute;
      top:2px;
      left:9px;
      width:4px;
      height:4px;
      border-top:1px solid rgba(148,163,184,.38);
      border-right:1px solid rgba(148,163,184,.38);
      background:rgba(148,163,184,.22);
      transform:skew(-10deg,-10deg);
    }

    .toolbar{
      display:flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-bottom:1px solid var(--line);
      background:rgba(2,6,23,.16);
      min-width:0;
    }
    .toolbar-edge,.toolbar-actions{display:flex;align-items:center;gap:6px;flex:0 0 auto}
    .toolbar-main{display:flex;flex-direction:column;gap:2px;min-width:0;flex:1}
    .editor-title{font-size:13px;font-weight:700}
    .toolbar-toggle{white-space:nowrap}
    .toolbar-menu{position:relative}
    .toolbar-menu summary{
      list-style:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      min-height:30px;
      padding:6px 10px;
      border:1px solid var(--line);
      border-radius:var(--control-radius);
      background:rgba(15,23,42,.72);
      color:var(--text);
      font-size:11px;
      font-weight:700;
      cursor:pointer;
    }
    .toolbar-menu summary::-webkit-details-marker{display:none}
    .toolbar-menu[open] summary{
      background:var(--accent);
      border-color:rgba(110,168,254,.28);
    }
    .toolbar-menu-panel{
      position:absolute;
      top:calc(100% + 6px);
      right:0;
      z-index:40;
      min-width:160px;
      display:flex;
      flex-direction:column;
      gap:4px;
      padding:6px;
      border:1px solid var(--line);
      border-radius:12px;
      background:rgba(15,23,42,.98);
      box-shadow:var(--shadow);
    }
    .toolbar-menu-panel button{
      width:100%;
      justify-content:flex-start;
      box-shadow:none;
    }

    .context-drawer{
      padding:0 10px 8px;
      border-bottom:1px solid var(--line);
      background:rgba(2,6,23,.18);
    }
    .context-drawer[hidden]{display:none}
    .context-drawer-frame{
      display:flex;
      flex-direction:column;
      min-height:0;
      border:1px solid var(--line);
      border-radius:var(--card-radius);
      background:rgba(15,23,42,.76);
      overflow:hidden;
    }
    .context-drawer-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      padding:8px 10px;
      border-bottom:1px solid var(--line);
      background:rgba(2,6,23,.16);
    }
    .context-drawer-body{padding:10px;overflow:auto;max-height:300px}
    .drawer-panel{display:flex;flex-direction:column;gap:12px}
    .pane-title{
      font-size:10px;
      font-weight:700;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--subtle);
    }
    .pane-subtitle{
      font-size:11px;
      line-height:1.5;
      color:var(--muted);
      white-space:pre-wrap;
      word-break:break-word;
    }

    .file-tabs{
      display:flex;
      gap:4px;
      padding:4px 10px;
      overflow:auto;
      border-bottom:1px solid var(--line);
      background:rgba(2,6,23,.26);
      min-height:30px;
    }
    .file-tab{
      display:flex;
      align-items:center;
      gap:6px;
      padding:4px 8px;
      border-radius:8px;
      border:1px solid rgba(148,163,184,.14);
      background:rgba(15,23,42,.72);
      cursor:pointer;
      color:var(--muted);
      font-size:11px;
      min-height:22px;
      min-width:0;
    }
    .file-tab:hover{border-color:rgba(148,163,184,.24);color:var(--text)}
    .file-tab.active{background:var(--accent);border-color:rgba(110,168,254,.28);color:var(--text)}
    .file-tab.dirty .file-name::after{content:" *";color:var(--warn)}
    .file-name{
      max-width:150px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .file-tab-close{
      padding:0 4px;
      font-size:10px;
      line-height:1;
      min-height:0;
    }

    .editor-shell{
      display:flex;
      padding:8px 10px 10px;
      min-height:0;
    }
    .pane{
      display:flex;
      flex-direction:column;
      min-height:0;
      min-width:0;
      border:1px solid var(--line);
      border-radius:var(--card-radius);
      background:rgba(15,23,42,.72);
      overflow:hidden;
      flex:1;
    }
    .editor-empty{margin:10px}
    .editor-textarea{
      flex:1;
      min-height:0;
      border:none;
      padding:12px;
      background:transparent;
      resize:none;
      font-family:"Cascadia Code","SFMono-Regular",Consolas,monospace;
      font-size:13px;
      line-height:1.65;
    }
    .editor-textarea[disabled]{color:var(--muted);cursor:not-allowed}
    .editor-statusbar{
      padding:7px 10px;
      border-top:1px solid var(--line);
      background:rgba(2,6,23,.14);
      font-size:11px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .assistant-chat-shell{
      padding:10px;
      min-height:0;
      display:flex;
    }
    .chat-card{
      display:grid;
      grid-template-rows:auto auto minmax(240px,1fr) auto;
      min-height:0;
      flex:1;
      padding:0;
      overflow:hidden;
    }
    .chat-meta{
      padding:10px 12px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg,rgba(110,168,254,.08),transparent),rgba(15,23,42,.62);
      font-size:11px;
      color:var(--muted);
    }
    .change-summary{
      display:flex;
      flex-direction:column;
      gap:8px;
      padding:8px 10px 10px;
      border-bottom:1px solid var(--line);
      background:rgba(2,6,23,.18);
      min-height:0;
    }
    .change-summary[hidden]{display:none}
    .change-summary-list{
      display:flex;
      flex-direction:column;
      gap:6px;
      max-height:180px;
      overflow:auto;
      min-height:0;
    }
    .change-link{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      width:100%;
      padding:8px 10px;
      border-radius:10px;
      border:1px solid transparent;
      background:rgba(148,163,184,.04);
      color:var(--text);
      text-align:left;
      box-shadow:none;
    }
    .change-link:hover{border-color:var(--line2)}
    .change-link.active{background:var(--accent);border-color:rgba(110,168,254,.28)}
    .change-link-main{
      display:flex;
      flex-direction:column;
      min-width:0;
      gap:2px;
    }
    .change-link-name{
      font-size:12px;
      font-weight:700;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .change-link-path{
      font-size:11px;
      color:var(--muted);
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .change-link-badges{display:flex;gap:6px;flex:0 0 auto}
    .diff-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:34px;
      padding:3px 6px;
      border-radius:999px;
      font-size:10px;
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .diff-badge.added{background:rgba(52,211,153,.16);color:#bbf7d0}
    .diff-badge.removed{background:rgba(248,113,113,.16);color:#fecaca}

    .messages{
      padding:12px;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:10px;
      min-height:0;
      background-image:
        linear-gradient(rgba(148,163,184,.04) 1px,transparent 1px),
        linear-gradient(90deg,rgba(148,163,184,.04) 1px,transparent 1px);
      background-size:20px 20px;
    }
    .message{
      position:relative;
      max-width:min(95%,540px);
      padding:12px 14px;
      border-radius:15px;
      border:1px solid var(--line);
      line-height:1.65;
      white-space:pre-wrap;
      word-break:break-word;
      background:rgba(15,23,42,.92);
    }
    .message::before{
      display:block;
      margin-bottom:8px;
      font-size:10px;
      font-weight:700;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--subtle);
    }
    .message.assistant::before{content:"助手"}
    .message.user::before{content:"你";color:rgba(224,231,255,.78)}
    .message.user{
      margin-left:auto;
      background:linear-gradient(135deg,rgba(110,168,254,.34),rgba(59,130,246,.16)),rgba(15,23,42,.98);
      border-color:rgba(110,168,254,.24);
    }
    .message.loading::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);
      animation:shimmer 1.4s linear infinite;
    }

    .composer{
      padding:10px 12px;
      border-top:1px solid var(--line);
      background:var(--surface-strong);
    }
    .status-bar{padding:8px 0 0;color:#fde68a;font-size:12px;min-height:24px}
    .task-item{padding:10px 0;border-top:1px solid rgba(148,163,184,.12)}
    .task-item:first-child{padding-top:0;border-top:none}
    .task-title{font-size:13px;font-weight:700}
    .task-status{margin-top:6px;font-size:12px;color:var(--subtle)}

    @keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}

    @media (max-width:1180px){
      body{overflow:auto}
      .layout{
        grid-template-columns:minmax(220px,32vw) minmax(0,1fr);
        grid-template-areas:
          "sidebar editor"
          "assistant assistant";
        width:100%;
        height:auto;
        min-height:100vh;
        padding:12px;
      }
      .sidebar{grid-area:sidebar}
      .editor{grid-area:editor;min-height:760px}
      .assistant{grid-area:assistant;min-height:560px}
      .layout.left-collapsed{
        grid-template-columns:minmax(0,1fr);
        grid-template-areas:
          "editor"
          "assistant";
      }
      .layout.right-collapsed{
        grid-template-columns:minmax(220px,32vw) minmax(0,1fr);
        grid-template-areas:"sidebar editor";
      }
      .layout.both-collapsed{
        grid-template-columns:minmax(0,1fr);
        grid-template-areas:"editor";
      }
    }

    @media (max-width:860px){
      .layout,
      .layout.left-collapsed,
      .layout.right-collapsed,
      .layout.both-collapsed{
        grid-template-columns:1fr;
        grid-template-areas:
          "editor"
          "sidebar"
          "assistant";
        padding:10px;
        gap:10px;
      }
      .layout.left-collapsed{
        grid-template-areas:
          "editor"
          "assistant";
      }
      .layout.right-collapsed{
        grid-template-areas:
          "editor"
          "sidebar";
      }
      .layout.both-collapsed{grid-template-areas:"editor"}
      .panel-header,.section-head,.row{flex-direction:column;align-items:stretch}
      .panel-actions{width:100%}
      .panel-actions button{flex:1 1 auto}
      .toolbar{flex-wrap:wrap}
      .toolbar-main{order:3;flex:1 0 100%}
      .toolbar-actions{margin-left:auto}
      .toolbar-menu{width:100%}
      .toolbar-menu summary{width:100%}
      .toolbar-menu-panel{left:0;right:0}
      .sidebar-body{grid-template-rows:auto auto}
      .settings-inline{grid-template-columns:1fr}
      .context-drawer{padding:0 10px 8px}
      .context-drawer-body{max-height:none}
      .change-link{align-items:flex-start}
      .change-link-badges{padding-top:1px}
    }
  </style>
</head>
<body>
  <div id="appLayout" class="layout">
    <section id="sidebarPanel" class="panel sidebar">
      <div class="panel-header">
        <div class="stack">
          <div class="panel-title">工作区</div>
          <div class="panel-subtitle">会话与文件树固定在左侧，便于连续切换代码上下文。</div>
        </div>
        <div class="panel-actions">
          <button id="newSessionBtn" class="secondary" type="button">新建会话</button>
          <button id="deleteSessionBtn" class="danger" type="button">删除会话</button>
        </div>
      </div>
      <div class="sidebar-body">
        <div class="card sidebar-card">
          <div class="section-head"><h3>会话列表</h3></div>
          <div id="sessionList" class="session-list"></div>
        </div>
        <div class="card sidebar-card sidebar-tree-card">
          <div class="section-head">
            <h3>文件树</h3>
            <button id="refreshTreeBtn" class="secondary" type="button">刷新</button>
          </div>
          <div id="workspaceMeta" class="mono">尚未选择会话</div>
          <div id="workspaceTree" class="workspace-tree"></div>
        </div>
      </div>
    </section>

    <section class="panel editor">
      <div class="panel-header">
        <div class="stack">
          <div class="panel-title">编辑区</div>
          <div class="panel-subtitle">编辑器优先，抽屉与辅助信息不再挤占核心代码空间。</div>
        </div>
        <div class="panel-actions">
          <button id="reloadFileBtn" class="secondary" type="button">重新加载</button>
          <button id="saveFileBtn" type="button">保存文件</button>
        </div>
      </div>

      <div class="toolbar">
        <div class="toolbar-edge">
          <button id="toggleLeftSidebarBtn" class="secondary toolbar-toggle" type="button" aria-controls="sidebarPanel" aria-expanded="true" aria-label="折叠左侧工作区侧栏">工作区</button>
        </div>
        <div class="toolbar-main">
          <div id="editorTitle" class="editor-title">本地代码工作台</div>
          <div id="editorMeta" class="panel-subtitle">多标签编辑模式，左右侧栏可独立折叠。</div>
        </div>
        <div class="toolbar-actions">
          <details id="toolbarMoreMenu" class="toolbar-menu">
            <summary>更多</summary>
            <div class="toolbar-menu-panel">
              <button class="secondary" type="button" data-drawer-target="settings">会话设置</button>
              <button class="secondary" type="button" data-drawer-target="tasks">任务看板</button>
              <button class="secondary" type="button" data-drawer-target="tests">最近测试</button>
              <button class="secondary" type="button" data-drawer-target="eval">最近评测</button>
            </div>
          </details>
          <button id="toggleRightSidebarBtn" class="secondary toolbar-toggle" type="button" aria-controls="assistantPanel" aria-expanded="true" aria-label="折叠右侧智能助手侧栏">助手</button>
        </div>
      </div>

      <section id="contextDrawer" class="context-drawer" hidden>
        <div class="context-drawer-frame">
          <div class="context-drawer-head">
            <div class="stack">
              <div id="contextDrawerTitle" class="pane-title">会话设置</div>
              <div id="contextDrawerSubtitle" class="pane-subtitle">绑定工作区、权限和测试参数。</div>
            </div>
            <button id="closeDrawerBtn" class="ghost" type="button">收起</button>
          </div>
          <div class="context-drawer-body">
            <div id="drawerSettingsPanel" class="drawer-panel">
              <div class="settings-card">
                <div class="section-head">
                  <h3>会话设置</h3>
                  <button id="saveSettingsBtn" class="secondary" type="button">保存</button>
                </div>
                <div class="settings-grid">
                  <label class="field">
                    <span class="field-label">工作区根目录</span>
                    <input id="workspaceInput" type="text" placeholder="问答模式可留空；任务模式请填写真实项目路径">
                    <div class="workspace-picker-row">
                      <button id="openFolderBtn" class="secondary" type="button">打开文件夹</button>
                      <button id="openFileBtn" class="secondary" type="button">打开文件</button>
                    </div>
                  </label>
                  <div class="setting-pills">
                    <label class="toggle-chip"><input id="allowWriteInput" type="checkbox"><span>写盘</span></label>
                    <label class="toggle-chip"><input id="allowShellInput" type="checkbox"><span>命令</span></label>
                    <label class="toggle-chip"><input id="autoRunTestsInput" type="checkbox"><span>自动测试</span></label>
                  </div>
                  <div class="settings-inline">
                    <label class="field">
                      <span class="field-label">测试命令</span>
                      <input id="testCommandInput" type="text" placeholder="例如：python -m pytest -q">
                    </label>
                    <label class="field">
                      <span class="field-label">轮次</span>
                      <input id="maxTurnsInput" type="number" min="1" max="20" value="8">
                    </label>
                  </div>
                </div>
              </div>
            </div>

            <div id="drawerTasksPanel" class="drawer-panel" hidden>
              <div class="section-head"><h3>任务看板</h3></div>
              <div id="taskBoard" class="empty">暂无任务</div>
            </div>

            <div id="drawerTestsPanel" class="drawer-panel" hidden>
              <div class="section-head">
                <h3>最近一次测试</h3>
                <button id="runTestsBtn" class="secondary" type="button">运行测试</button>
              </div>
              <div id="testSummary" class="empty">尚未运行测试</div>
            </div>

            <div id="drawerEvalPanel" class="drawer-panel" hidden>
              <div class="section-head"><h3>最近评测</h3></div>
              <div id="evalSummary" class="empty">尚无评测结果</div>
            </div>
          </div>
        </div>
      </section>

      <div id="fileTabs" class="file-tabs"></div>

      <div class="editor-shell">
        <div class="pane">
          <div id="editorEmpty" class="empty editor-empty">点击左侧文件树中的文件开始查看或编辑。支持多文件标签切换。</div>
          <textarea id="editorTextarea" class="editor-textarea" spellcheck="false" hidden></textarea>
          <div id="editorStatus" class="editor-statusbar">尚未打开文件</div>
        </div>
      </div>
    </section>

    <aside id="assistantPanel" class="panel assistant">
      <div class="panel-header">
        <div class="stack">
          <div class="panel-title">智能助手</div>
          <div class="panel-subtitle">对话、改动摘要与运行反馈都集中在这里。</div>
        </div>
      </div>
      <div class="assistant-chat-shell">
        <div class="card chat-card">
          <div id="chatMeta" class="chat-meta">尚未选择会话</div>
          <section id="changeSummary" class="change-summary" hidden>
            <div class="stack">
              <div class="pane-title">本次修改</div>
              <div id="changeSummaryMeta" class="pane-subtitle">暂无变更</div>
            </div>
            <div id="changeSummaryList" class="change-summary-list"></div>
          </section>
          <div id="messages" class="messages"></div>
          <div class="composer">
            <textarea id="messageInput" placeholder="输入你的目标，例如：分析登录模块并修改错误处理，然后补充最小测试。Enter 发送，Shift+Enter 换行。"></textarea>
            <div class="row" style="margin-top:10px">
              <button id="sendBtn" type="button">发送任务</button>
              <button id="stopBtn" class="warn" type="button">停止流式</button>
            </div>
            <div id="statusBar" class="status-bar"></div>
          </div>
        </div>
      </div>
    </aside>
  </div>
  <script>
    const LAYOUT_STORAGE_KEY = "codeinsight.web.layout.v1";
    const DEFAULT_MAX_TURNS = 8;
    const MIN_MAX_TURNS = 1;
    const MAX_MAX_TURNS = 20;

    const state = {
      sessions: [],
      currentSession: null,
      streamController: null,
      streamStopRequested: false,
      streamTerminalStatus: "",
      pendingAssistantEl: null,
      pendingAssistantText: "",
      workspaceEntries: [],
      expanded: { ".": true },
      openFiles: [],
      activeFilePath: "",
      pendingPickedFilePath: "",
      drawerPanel: "settings",
      drawerOpen: false,
      leftCollapsed: false,
      rightCollapsed: false
    };

    const $ = id => document.getElementById(id);
    const els = {
      layout: $("appLayout"),
      sidebarPanel: $("sidebarPanel"),
      assistantPanel: $("assistantPanel"),
      toggleLeftSidebarBtn: $("toggleLeftSidebarBtn"),
      toggleRightSidebarBtn: $("toggleRightSidebarBtn"),
      toolbarMoreMenu: $("toolbarMoreMenu"),
      sessionList: $("sessionList"),
      workspaceMeta: $("workspaceMeta"),
      workspaceTree: $("workspaceTree"),
      refreshTreeBtn: $("refreshTreeBtn"),
      fileTabs: $("fileTabs"),
      contextDrawer: $("contextDrawer"),
      contextDrawerTitle: $("contextDrawerTitle"),
      contextDrawerSubtitle: $("contextDrawerSubtitle"),
      closeDrawerBtn: $("closeDrawerBtn"),
      drawerSettingsPanel: $("drawerSettingsPanel"),
      drawerTasksPanel: $("drawerTasksPanel"),
      drawerTestsPanel: $("drawerTestsPanel"),
      drawerEvalPanel: $("drawerEvalPanel"),
      editorTitle: $("editorTitle"),
      editorMeta: $("editorMeta"),
      editorStatus: $("editorStatus"),
      editorEmpty: $("editorEmpty"),
      editorTextarea: $("editorTextarea"),
      reloadFileBtn: $("reloadFileBtn"),
      saveFileBtn: $("saveFileBtn"),
      changeSummary: $("changeSummary"),
      changeSummaryMeta: $("changeSummaryMeta"),
      changeSummaryList: $("changeSummaryList"),
      messages: $("messages"),
      taskBoard: $("taskBoard"),
      testSummary: $("testSummary"),
      evalSummary: $("evalSummary"),
      chatMeta: $("chatMeta"),
      statusBar: $("statusBar"),
      sendBtn: $("sendBtn"),
      stopBtn: $("stopBtn"),
      runTestsBtn: $("runTestsBtn"),
      saveSettingsBtn: $("saveSettingsBtn"),
      newSessionBtn: $("newSessionBtn"),
      deleteSessionBtn: $("deleteSessionBtn"),
      openFolderBtn: $("openFolderBtn"),
      openFileBtn: $("openFileBtn"),
      messageInput: $("messageInput"),
      workspaceInput: $("workspaceInput"),
      allowWriteInput: $("allowWriteInput"),
      allowShellInput: $("allowShellInput"),
      autoRunTestsInput: $("autoRunTestsInput"),
      testCommandInput: $("testCommandInput"),
      maxTurnsInput: $("maxTurnsInput")
    };

    const drawerButtons = [...document.querySelectorAll("[data-drawer-target]")];
    const sendBtnEl = els.sendBtn;
    const runTestsBtnEl = els.runTestsBtn;
    const saveSettingsBtnEl = els.saveSettingsBtn;
    const drawerMeta = {
      settings: { title: "会话设置", subtitle: "绑定工作区、权限和测试参数。" },
      tasks: { title: "任务看板", subtitle: "查看当前会话拆解出的任务状态与摘要。" },
      tests: { title: "最近一次测试", subtitle: "保留最近一次测试结果，并支持立即重跑。" },
      eval: { title: "最近评测", subtitle: "查看最新评测摘要，不打断当前对话。" }
    };

    function setStatus(text) {
      els.statusBar.textContent = text || "";
    }

    function setStreamTerminalStatus(text) {
      state.streamTerminalStatus = text || "";
      if (state.streamTerminalStatus) setStatus(state.streamTerminalStatus);
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatWorkspaceLabel(value) {
      return value || "问答模式 / 未配置工作区";
    }

    function formatTimestamp(value) {
      if (!value) return "未知时间";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      return date.toLocaleString("zh-CN", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function normPath(value) {
      return String(value || "").replace(/\\/g, "/").replace(/^\.\/+/, "");
    }

    function baseName(value) {
      const parts = normPath(value).split("/");
      return parts[parts.length - 1] || value;
    }

    function normalizeMaxTurns(value) {
      const parsed = Number(value);
      if (!Number.isInteger(parsed) || parsed < MIN_MAX_TURNS || parsed > MAX_MAX_TURNS) {
        return DEFAULT_MAX_TURNS;
      }
      return parsed;
    }

    function readLayoutState() {
      try {
        const raw = localStorage.getItem(LAYOUT_STORAGE_KEY);
        if (!raw) return;
        const saved = JSON.parse(raw);
        state.leftCollapsed = !!saved.leftCollapsed;
        state.rightCollapsed = !!saved.rightCollapsed;
      } catch {
        state.leftCollapsed = false;
        state.rightCollapsed = false;
      }
    }

    function persistLayoutState() {
      try {
        localStorage.setItem(
          LAYOUT_STORAGE_KEY,
          JSON.stringify({
            leftCollapsed: !!state.leftCollapsed,
            rightCollapsed: !!state.rightCollapsed
          })
        );
      } catch {
      }
    }

    function applyLayoutState() {
      const bothCollapsed = state.leftCollapsed && state.rightCollapsed;
      els.layout.classList.toggle("left-collapsed", state.leftCollapsed);
      els.layout.classList.toggle("right-collapsed", state.rightCollapsed);
      els.layout.classList.toggle("both-collapsed", bothCollapsed);
      els.layout.dataset.layoutState = bothCollapsed
        ? "both-collapsed"
        : state.leftCollapsed
          ? "left-collapsed"
          : state.rightCollapsed
            ? "right-collapsed"
            : "default";

      els.sidebarPanel.hidden = !!state.leftCollapsed;
      els.assistantPanel.hidden = !!state.rightCollapsed;
      els.sidebarPanel.setAttribute("aria-hidden", String(!!state.leftCollapsed));
      els.assistantPanel.setAttribute("aria-hidden", String(!!state.rightCollapsed));

      els.toggleLeftSidebarBtn.setAttribute("aria-expanded", String(!state.leftCollapsed));
      els.toggleLeftSidebarBtn.setAttribute(
        "aria-label",
        state.leftCollapsed ? "展开左侧工作区侧栏" : "折叠左侧工作区侧栏"
      );
      els.toggleLeftSidebarBtn.classList.toggle("active", !state.leftCollapsed);

      els.toggleRightSidebarBtn.setAttribute("aria-expanded", String(!state.rightCollapsed));
      els.toggleRightSidebarBtn.setAttribute(
        "aria-label",
        state.rightCollapsed ? "展开右侧智能助手侧栏" : "折叠右侧智能助手侧栏"
      );
      els.toggleRightSidebarBtn.classList.toggle("active", !state.rightCollapsed);
    }

    function toggleLeftSidebar() {
      const shouldRefocus = els.sidebarPanel.contains(document.activeElement);
      state.leftCollapsed = !state.leftCollapsed;
      applyLayoutState();
      persistLayoutState();
      if (shouldRefocus) {
        requestAnimationFrame(() => els.toggleLeftSidebarBtn.focus({ preventScroll: true }));
      }
    }

    function toggleRightSidebar() {
      const shouldRefocus = els.assistantPanel.contains(document.activeElement);
      state.rightCollapsed = !state.rightCollapsed;
      applyLayoutState();
      persistLayoutState();
      if (shouldRefocus) {
        requestAnimationFrame(() => els.toggleRightSidebarBtn.focus({ preventScroll: true }));
      }
    }

    function sessionSettings() {
      const maxTurns = normalizeMaxTurns(els.maxTurnsInput.value);
      els.maxTurnsInput.value = maxTurns;
      return {
        allow_write: els.allowWriteInput.checked,
        allow_shell: els.allowShellInput.checked,
        auto_run_tests: els.autoRunTestsInput.checked,
        test_command: els.testCommandInput.value.trim(),
        max_turns: maxTurns
      };
    }

    function applySessionToControls(session) {
      const settings = session?.settings || {};
      const maxTurns = normalizeMaxTurns(settings.max_turns);
      els.workspaceInput.value = session?.workspace_root || "";
      els.allowWriteInput.checked = !!settings.allow_write;
      els.allowShellInput.checked = !!settings.allow_shell;
      els.autoRunTestsInput.checked = !!settings.auto_run_tests;
      els.testCommandInput.value = settings.test_command || "";
      els.maxTurnsInput.value = maxTurns;
    }

    function renderContextDrawer() {
      const panel = drawerMeta[state.drawerPanel] ? state.drawerPanel : "settings";
      const meta = drawerMeta[panel];
      const panels = {
        settings: els.drawerSettingsPanel,
        tasks: els.drawerTasksPanel,
        tests: els.drawerTestsPanel,
        eval: els.drawerEvalPanel
      };
      state.drawerPanel = panel;
      els.contextDrawer.hidden = !state.drawerOpen;
      els.contextDrawerTitle.textContent = meta.title;
      els.contextDrawerSubtitle.textContent = meta.subtitle;
      Object.entries(panels).forEach(([key, element]) => {
        if (element) element.hidden = key !== panel;
      });
      drawerButtons.forEach(button => {
        button.classList.toggle("active", state.drawerOpen && button.dataset.drawerTarget === panel);
      });
    }

    function toggleContextDrawer(panel) {
      const nextPanel = drawerMeta[panel] ? panel : "settings";
      if (state.drawerOpen && state.drawerPanel === nextPanel) state.drawerOpen = false;
      else {
        state.drawerPanel = nextPanel;
        state.drawerOpen = true;
      }
      if (els.toolbarMoreMenu) els.toolbarMoreMenu.open = false;
      renderContextDrawer();
    }

    function dirtyOpenFiles() {
      return state.openFiles.filter(file => file.dirty);
    }

    function getOpenFile(path) {
      return state.openFiles.find(file => file.path === normPath(path)) || null;
    }

    function getActiveFile() {
      return getOpenFile(state.activeFilePath);
    }

    function canEditActiveFile() {
      const file = getActiveFile();
      return !!file && !!state.currentSession?.settings?.allow_write && !file.truncated && !state.streamController;
    }

    function canSaveActiveFile() {
      const file = getActiveFile();
      return !!file && file.dirty && canEditActiveFile();
    }

    function hasDirtyOpenFiles() {
      return state.openFiles.some(file => file.dirty);
    }

    function ensureExpanded(path) {
      const parts = normPath(path).split("/");
      let current = "";
      for (let index = 0; index < parts.length - 1; index += 1) {
        current = current ? `${current}/${parts[index]}` : parts[index];
        state.expanded[current] = true;
      }
    }

    function upsertOpenFile(file) {
      const index = state.openFiles.findIndex(item => item.path === file.path);
      if (index >= 0) state.openFiles[index] = { ...state.openFiles[index], ...file };
      else state.openFiles.push(file);
      state.activeFilePath = file.path;
      ensureExpanded(file.path);
    }

    function setStreamingControls(busy) {
      sendBtnEl.disabled = busy;
      runTestsBtnEl.disabled = busy;
      saveSettingsBtnEl.disabled = busy;
      els.newSessionBtn.disabled = busy;
      els.deleteSessionBtn.disabled = busy;
      els.openFolderBtn.disabled = busy;
      els.openFileBtn.disabled = busy;
      els.messageInput.disabled = busy;
      els.refreshTreeBtn.disabled = busy;
      els.stopBtn.disabled = !busy;
      els.reloadFileBtn.disabled = busy || !getActiveFile();
      els.saveFileBtn.disabled = busy || !canSaveActiveFile();
      renderEditor();
    }

    async function fetchJson(url, options = {}) {
      const response = await fetch(url, {
        headers: { "Content-Type": "application/json" },
        ...options
      });
      if (!response.ok) {
        const body = await response.json().catch(() => ({}));
        throw new Error(body.detail || `请求失败: ${response.status}`);
      }
      return response.json();
    }

    function updateMeta() {
      els.chatMeta.textContent = !state.currentSession
        ? "尚未选择会话"
        : `${state.currentSession.title} | ${formatWorkspaceLabel(state.currentSession.workspace_root)}`;
    }

    function resetWorkspaceState() {
      state.workspaceEntries = [];
      state.expanded = { ".": true };
      state.openFiles = [];
      state.activeFilePath = "";
      renderWorkspaceMeta();
      renderWorkspaceTree();
      renderFileTabs();
      renderEditor();
    }

    function currentWorkspaceFilter() {
      return normPath(els.workspaceInput.value.trim() || state.currentSession?.workspace_root || "");
    }

    function sessionsForWorkspace(workspaceRoot) {
      const root = normPath(workspaceRoot);
      return state.sessions.filter(session => normPath(session.workspace_root) === root);
    }

    function qaSessions() {
      return state.sessions.filter(session => !normPath(session.workspace_root));
    }

    function preferredSession(filterRoot = currentWorkspaceFilter()) {
      const scoped = filterRoot ? sessionsForWorkspace(filterRoot) : qaSessions();
      return scoped[0] || state.sessions[0] || null;
    }

    function renderSessionCards(items, { emptyText, showWorkspace = false } = {}) {
      if (!items.length) return `<div class="empty">${escapeHtml(emptyText || "暂无会话")}</div>`;
      return items.map(session => `
        <div class="session-card ${state.currentSession?.session_id === session.session_id ? "active" : ""}" data-session-id="${escapeHtml(session.session_id)}">
          <div class="session-title">${escapeHtml(session.title)}</div>
          <div class="session-meta">${escapeHtml(formatTimestamp(session.updated_at))}</div>
          ${showWorkspace ? `<div class="session-meta">${escapeHtml(formatWorkspaceLabel(session.workspace_root))}</div>` : ""}
        </div>
      `).join("");
    }

    function renderSessionGroup(title, note, items, { emptyText, showWorkspace = false } = {}) {
      return `
        <section class="session-group">
          <div class="session-group-head">
            <div>
              <div class="session-group-title">${escapeHtml(title)}</div>
              <div class="session-group-note">${escapeHtml(note)}</div>
            </div>
          </div>
          ${renderSessionCards(items, { emptyText, showWorkspace })}
        </section>
      `;
    }

    function renderSessions() {
      if (!state.sessions.length) {
        els.sessionList.innerHTML = '<div class="empty">暂无会话。先选择工作区或进入问答模式，再创建会话。</div>';
        return;
      }
      const filterRoot = currentWorkspaceFilter();
      const workspaceSessions = filterRoot ? sessionsForWorkspace(filterRoot) : [];
      const globalQaSessions = qaSessions();
      const workspaceTitle = filterRoot ? "当前工作区会话" : "尚未选择工作区";
      const workspaceNote = filterRoot
        ? formatWorkspaceLabel(filterRoot)
        : "输入或选择工作区后，这里只显示对应目录的会话。";
      els.sessionList.innerHTML = [
        renderSessionGroup(workspaceTitle, workspaceNote, workspaceSessions, {
          emptyText: filterRoot ? "当前工作区暂无会话。" : "先选择工作区后查看绑定会话。"
        }),
        renderSessionGroup("问答模式会话池", "全局共享，不绑定本地目录。", globalQaSessions, {
          emptyText: "暂无问答模式会话。"
        })
      ].join("");
      els.sessionList.querySelectorAll(".session-card").forEach(card => {
        card.addEventListener("click", () => loadSession(card.dataset.sessionId).catch(error => setStatus(error.message)));
      });
    }

    function renderMessages(session) {
      const messages = session?.messages || [];
      if (!messages.length) {
        els.messages.innerHTML = state.pendingAssistantEl
          ? ""
          : '<div class="empty">开始一轮多步对话后，消息会显示在这里。</div>';
        if (state.pendingAssistantEl) els.messages.appendChild(state.pendingAssistantEl);
        return;
      }
      els.messages.innerHTML = messages.map(message => `
        <div class="message ${message.role === "user" ? "user" : "assistant"}">${escapeHtml(message.content)}</div>
      `).join("");
      if (state.pendingAssistantEl) els.messages.appendChild(state.pendingAssistantEl);
      els.messages.scrollTop = els.messages.scrollHeight;
    }

    function renderTasks(tasks) {
      if (!tasks?.length) {
        els.taskBoard.innerHTML = '<div class="empty">暂无任务</div>';
        return;
      }
      els.taskBoard.innerHTML = tasks.map(task => `
        <div class="task-item">
          <div class="task-title">${escapeHtml(task.title)}</div>
          <div class="task-status">状态：${escapeHtml(task.status)} | 依赖：${escapeHtml((task.depends_on || []).join(", ") || "无")}</div>
          <div class="task-summary">${escapeHtml(task.summary || task.description || "")}</div>
        </div>
      `).join("");
    }

    function renderTestSummary(summary) {
      if (!summary) {
        els.testSummary.innerHTML = '<div class="empty">尚未运行测试</div>';
        return;
      }
      const title = summary.cancelled ? "已取消" : (summary.passed ? "通过" : "失败");
      els.testSummary.innerHTML = `
        <div class="task-title">${title}</div>
        <div class="task-status">耗时：${escapeHtml(summary.duration_ms)} ms</div>
        <div class="task-status">命令：${escapeHtml(summary.command || "")}</div>
        <div class="task-summary">${escapeHtml(summary.raw_tail || "")}</div>
      `;
    }

    function renderEval(payload) {
      if (!payload?.payload) {
        els.evalSummary.innerHTML = '<div class="empty">尚无评测结果</div>';
        return;
      }
      const summary = payload.payload.summary || {};
      els.evalSummary.innerHTML = `
        <div class="task-title">${escapeHtml(payload.path || "")}</div>
        <div class="task-status">成功率：${escapeHtml(summary.success_rate ?? "暂无")}</div>
        <div class="task-status">平均耗时：${escapeHtml(summary.avg_duration_ms ?? "暂无")} ms</div>
        <div class="task-status">恢复触发率：${escapeHtml(summary.recovery_trigger_rate ?? "暂无")}</div>
      `;
    }

    function renderWorkspaceMeta(note = "") {
      if (!state.currentSession) {
        els.workspaceMeta.textContent = "尚未选择会话";
        return;
      }
      if (!state.currentSession.workspace_root) {
        els.workspaceMeta.textContent = "当前会话未配置工作区。问答模式可以留空；要浏览或编辑文件，请先填写真实项目路径并保存设置。";
        return;
      }
      const lines = [
        `工作区: ${formatWorkspaceLabel(state.currentSession.workspace_root)}`,
        `条目数: ${state.workspaceEntries.length}`
      ];
      if (note) lines.push(note);
      els.workspaceMeta.textContent = lines.join("\n");
    }

    function fileMetaLabel(name) {
      const parts = String(name || "").split(".");
      if (parts.length < 2) return "文件";
      return parts.pop().slice(0, 4).toUpperCase();
    }

    function buildTree(entries) {
      const roots = [];
      for (const entry of entries) {
        const parts = normPath(entry.path).split("/").filter(Boolean);
        let siblings = roots;
        let current = "";
        for (let index = 0; index < parts.length; index += 1) {
          const part = parts[index];
          const isLast = index === parts.length - 1;
          current = current ? `${current}/${part}` : part;
          let node = siblings.find(item => item.path === current);
          if (!node) {
            node = { path: current, name: part, is_dir: isLast ? !!entry.is_dir : true, children: [] };
            siblings.push(node);
          }
          if (isLast) node.is_dir = !!entry.is_dir;
          else node.is_dir = true;
          siblings = node.children;
        }
      }
      const sortNodes = nodes => {
        nodes.sort((a, b) => {
          if (a.is_dir !== b.is_dir) return a.is_dir ? -1 : 1;
          return a.name.localeCompare(b.name, "zh-CN");
        });
        nodes.forEach(node => sortNodes(node.children));
      };
      sortNodes(roots);
      return roots;
    }

    function renderTreeNodes(nodes, depth = 0) {
      return nodes.map(node => {
        const open = node.is_dir && state.expanded[node.path] !== false;
        const active = state.activeFilePath === node.path ? "active" : "";
        const toggle = node.is_dir
          ? `<button class="tree-toggle" type="button" data-dir="${escapeHtml(node.path)}" aria-label="${open ? "折叠目录" : "展开目录"}">${open ? "v" : ">"}</button>`
          : '<span class="tree-spacer"></span>';
        const actionAttr = node.is_dir
          ? `data-dir="${escapeHtml(node.path)}"`
          : `data-file="${escapeHtml(node.path)}"`;
        const iconClass = node.is_dir ? `tree-icon folder${open ? " open" : ""}` : "tree-icon file";
        const meta = node.is_dir ? "目录" : fileMetaLabel(node.name);
        const children = node.is_dir && open && node.children.length
          ? `<div class="tree-children">${renderTreeNodes(node.children, depth + 1)}</div>`
          : "";
        return `
          <div class="tree-node">
            <div class="tree-row ${active}" style="padding-left:${6 + depth * 12}px">
              ${toggle}
              <button class="tree-action" type="button" ${actionAttr} title="${escapeHtml(node.path)}">
                <span class="tree-main">
                  <span class="${iconClass}" aria-hidden="true"></span>
                  <span class="tree-name">${escapeHtml(node.name)}</span>
                </span>
                <span class="tree-meta">${escapeHtml(meta)}</span>
              </button>
            </div>
            ${children}
          </div>
        `;
      }).join("");
    }

    function renderWorkspaceTree() {
      if (!state.currentSession) {
        els.workspaceTree.innerHTML = '<div class="empty">先创建或选择会话。</div>';
        return;
      }
      if (!state.currentSession.workspace_root) {
        els.workspaceTree.innerHTML = '<div class="empty">当前会话没有工作区，无法浏览目录。</div>';
        return;
      }
      if (!state.workspaceEntries.length) {
        els.workspaceTree.innerHTML = '<div class="empty">文件树为空。点击“刷新”重新拉取，或确认工作区路径是否正确。</div>';
        return;
      }
      els.workspaceTree.innerHTML = renderTreeNodes(buildTree(state.workspaceEntries));
      els.workspaceTree.querySelectorAll("[data-dir]").forEach(element => {
        element.addEventListener("click", () => {
          state.expanded[element.dataset.dir] = !(state.expanded[element.dataset.dir] !== false);
          renderWorkspaceTree();
        });
      });
      els.workspaceTree.querySelectorAll("[data-file]").forEach(element => {
        element.addEventListener("click", () => openFile(element.dataset.file).catch(error => setStatus(error.message)));
      });
    }

    function renderFileTabs() {
      if (!state.openFiles.length) {
        els.fileTabs.innerHTML = '<div class="empty" style="padding:8px 10px">尚未打开文件</div>';
        return;
      }
      els.fileTabs.innerHTML = state.openFiles.map(file => `
        <div class="file-tab ${file.path === state.activeFilePath ? "active" : ""} ${file.dirty ? "dirty" : ""}" data-tab="${escapeHtml(file.path)}" title="${escapeHtml(file.path)}">
          <span class="file-name">${escapeHtml(file.name)}</span>
          <button class="ghost file-tab-close" type="button" data-close="${escapeHtml(file.path)}" aria-label="关闭文件">x</button>
        </div>
      `).join("");
      els.fileTabs.querySelectorAll("[data-tab]").forEach(element => {
        element.addEventListener("click", () => {
          state.activeFilePath = element.dataset.tab;
          ensureExpanded(state.activeFilePath);
          renderWorkspaceTree();
          renderFileTabs();
          renderEditor();
        });
      });
      els.fileTabs.querySelectorAll("[data-close]").forEach(element => {
        element.addEventListener("click", event => {
          event.stopPropagation();
          closeFileTab(element.dataset.close);
        });
      });
    }

    function fallbackDiff(beforeLines, afterLines) {
      const lines = [];
      let add = 0;
      let del = 0;
      for (let index = 0; index < Math.max(beforeLines.length, afterLines.length); index += 1) {
        if (beforeLines[index] === afterLines[index]) {
          lines.push({ t: "context", l: beforeLines[index] !== undefined ? index + 1 : "", r: afterLines[index] !== undefined ? index + 1 : "", s: beforeLines[index] ?? "" });
          continue;
        }
        if (beforeLines[index] !== undefined) {
          lines.push({ t: "removed", l: index + 1, r: "", s: beforeLines[index] });
          del += 1;
        }
        if (afterLines[index] !== undefined) {
          lines.push({ t: "added", l: "", r: index + 1, s: afterLines[index] });
          add += 1;
        }
      }
      return { lines, add, del, fallback: true };
    }

    function diffLines(beforeText, afterText) {
      const beforeLines = String(beforeText || "").split("\n");
      const afterLines = String(afterText || "").split("\n");
      if (beforeLines.length * afterLines.length > 60000) return fallbackDiff(beforeLines, afterLines);
      const dp = Array.from({ length: beforeLines.length + 1 }, () => new Uint16Array(afterLines.length + 1));
      for (let i = beforeLines.length - 1; i >= 0; i -= 1) {
        for (let j = afterLines.length - 1; j >= 0; j -= 1) {
          dp[i][j] = beforeLines[i] === afterLines[j]
            ? dp[i + 1][j + 1] + 1
            : Math.max(dp[i + 1][j], dp[i][j + 1]);
        }
      }
      const lines = [];
      let add = 0;
      let del = 0;
      let i = 0;
      let j = 0;
      while (i < beforeLines.length && j < afterLines.length) {
        if (beforeLines[i] === afterLines[j]) {
          lines.push({ t: "context", l: i + 1, r: j + 1, s: beforeLines[i] });
          i += 1;
          j += 1;
        } else if (dp[i + 1][j] >= dp[i][j + 1]) {
          lines.push({ t: "removed", l: i + 1, r: "", s: beforeLines[i] });
          del += 1;
          i += 1;
        } else {
          lines.push({ t: "added", l: "", r: j + 1, s: afterLines[j] });
          add += 1;
          j += 1;
        }
      }
      while (i < beforeLines.length) {
        lines.push({ t: "removed", l: i + 1, r: "", s: beforeLines[i] });
        del += 1;
        i += 1;
      }
      while (j < afterLines.length) {
        lines.push({ t: "added", l: "", r: j + 1, s: afterLines[j] });
        add += 1;
        j += 1;
      }
      return { lines, add, del, fallback: false };
    }

    function firstChangedLine(diff) {
      const first = diff.lines.find(line => line.t !== "context");
      return Number(first?.r || first?.l || 1) || 1;
    }

    function lineOffset(content, lineNumber) {
      const target = Math.max(1, Number(lineNumber) || 1);
      const lines = String(content || "").split("\n");
      let offset = 0;
      for (let index = 1; index < target && index < lines.length + 1; index += 1) {
        offset += lines[index - 1].length + 1;
      }
      return offset;
    }

    function focusEditorAtLine(lineNumber) {
      requestAnimationFrame(() => {
        if (els.editorTextarea.hidden) return;
        const offset = lineOffset(els.editorTextarea.value, lineNumber);
        els.editorTextarea.focus({ preventScroll: true });
        els.editorTextarea.setSelectionRange(offset, offset);
        const lineHeight = parseFloat(window.getComputedStyle(els.editorTextarea).lineHeight) || 21;
        els.editorTextarea.scrollTop = Math.max(0, (Math.max(1, Number(lineNumber) || 1) - 3) * lineHeight);
      });
    }

    function renderChangeSummary() {
      const dirtyFiles = dirtyOpenFiles();
      if (!dirtyFiles.length) {
        els.changeSummary.hidden = true;
        els.changeSummaryMeta.textContent = "暂无变更";
        els.changeSummaryList.innerHTML = "";
        return;
      }

      const entries = dirtyFiles.map(file => {
        const diff = diffLines(file.originalContent, file.content);
        return { file, diff, firstLine: firstChangedLine(diff) };
      });
      const totalAdd = entries.reduce((sum, entry) => sum + entry.diff.add, 0);
      const totalDel = entries.reduce((sum, entry) => sum + entry.diff.del, 0);
      const entryMap = new Map(entries.map(entry => [entry.file.path, entry]));

      els.changeSummary.hidden = false;
      els.changeSummaryMeta.textContent = `共 ${entries.length} 个文件，新增 ${totalAdd} 行，删除 ${totalDel} 行`;
      els.changeSummaryList.innerHTML = entries.map(entry => `
        <button class="change-link ${entry.file.path === state.activeFilePath ? "active" : ""}" type="button" data-change-file="${escapeHtml(entry.file.path)}" title="${escapeHtml(entry.file.path)}">
          <span class="change-link-main">
            <span class="change-link-name">${escapeHtml(entry.file.name)}</span>
            <span class="change-link-path">${escapeHtml(entry.file.path)}</span>
          </span>
          <span class="change-link-badges">
            <span class="diff-badge added">+${entry.diff.add}</span>
            <span class="diff-badge removed">-${entry.diff.del}</span>
          </span>
        </button>
      `).join("");

      els.changeSummaryList.querySelectorAll("[data-change-file]").forEach(element => {
        element.addEventListener("click", async () => {
          const entry = entryMap.get(element.dataset.changeFile);
          if (!entry) return;
          try {
            await openFile(entry.file.path, { quiet: true });
            focusEditorAtLine(entry.firstLine);
            setStatus(`已打开 ${entry.file.path}`);
          } catch (error) {
            setStatus(error.message || "打开修改文件失败。");
          }
        });
      });
    }

    function renderEditor() {
      const file = getActiveFile();
      if (!file) {
        els.editorTitle.textContent = "本地代码工作台";
        els.editorMeta.textContent = "多标签编辑模式，左右侧栏可独立折叠。";
        els.editorStatus.textContent = "尚未打开文件";
        els.editorEmpty.hidden = false;
        els.editorTextarea.hidden = true;
        els.editorTextarea.value = "";
        els.editorTextarea.disabled = true;
        els.reloadFileBtn.disabled = true;
        els.saveFileBtn.disabled = true;
        renderChangeSummary();
        return;
      }

      const tabIndex = Math.max(0, state.openFiles.findIndex(item => item.path === file.path)) + 1;
      const modeLabel = state.currentSession?.workspace_root ? "工作区模式" : "问答模式";
      const bits = [`标签 ${tabIndex}/${state.openFiles.length}`];
      if (file.contentHash) bits.push(`校验 ${file.contentHash.slice(0, 12)}`);
      if (file.truncated) bits.push("文件过大，只读");
      else if (!state.currentSession?.settings?.allow_write) bits.push("当前会话未开启写权限");
      else if (file.dirty) bits.push("存在未保存修改");
      else bits.push("已与磁盘同步");
      if (state.streamController) bits.push("助手执行中");

      els.editorTitle.textContent = "代码编辑器";
      els.editorMeta.textContent = `已打开 ${state.openFiles.length} 个标签 | ${modeLabel}`;
      els.editorStatus.textContent = bits.join(" | ");
      els.editorEmpty.hidden = true;
      els.editorTextarea.hidden = false;
      if (els.editorTextarea.value !== file.content) els.editorTextarea.value = file.content;
      els.editorTextarea.disabled = !canEditActiveFile();
      els.reloadFileBtn.disabled = !!state.streamController;
      els.saveFileBtn.disabled = !canSaveActiveFile();
      renderChangeSummary();
    }

    async function refreshSessions() {
      state.sessions = await fetchJson("/sessions");
      renderSessions();
    }

    async function loadSession(id) {
      if (state.streamController) {
        setStatus("请先等待当前流式运行结束。");
        return;
      }
      if (state.currentSession?.session_id === id) return;
      if (hasDirtyOpenFiles() && !window.confirm("切换会话会丢失未保存的文件修改。是否继续？")) return;
      state.currentSession = await fetchJson(`/sessions/${id}`);
      applySessionToControls(state.currentSession);
      resetWorkspaceState();
      renderMessages(state.currentSession);
      renderTasks(state.currentSession.tasks);
      renderTestSummary(state.currentSession.last_test_summary);
      updateMeta();
      renderSessions();
      await refreshWorkspaceTree({ skipPersist: true, silent: true });
    }

    async function createSession() {
      if (state.streamController) {
        setStatus("请先等待当前流式运行结束。");
        return;
      }
      const session = await fetchJson("/sessions", {
        method: "POST",
        body: JSON.stringify({
          workspace_root: els.workspaceInput.value.trim(),
          settings: sessionSettings()
        })
      });
      await refreshSessions();
      await loadSession(session.session_id);
      if (state.pendingPickedFilePath) {
        const pendingPath = state.pendingPickedFilePath;
        state.pendingPickedFilePath = "";
        await openFile(pendingPath, { skipPersist: true, quiet: true });
        setStatus(`已创建新会话并打开 ${pendingPath}`);
        return;
      }
      setStatus("已创建新会话。");
    }

    async function persistCurrentControls({ silent = false, refreshWorkspace = false } = {}) {
      if (!state.currentSession) throw new Error("请先创建或选择会话。");
      const nextRoot = els.workspaceInput.value.trim();
      const previousRoot = state.currentSession.workspace_root || "";
      if (nextRoot !== previousRoot && hasDirtyOpenFiles() && !window.confirm("切换工作区会丢失未保存的文件修改。是否继续？")) {
        throw new Error("已取消切换工作区。");
      }
      state.currentSession = await fetchJson(`/sessions/${state.currentSession.session_id}`, {
        method: "PATCH",
        body: JSON.stringify({
          workspace_root: nextRoot,
          settings: sessionSettings()
        })
      });
      await refreshSessions();
      renderSessions();
      renderTestSummary(state.currentSession.last_test_summary);
      updateMeta();
      if (refreshWorkspace || nextRoot !== previousRoot) {
        resetWorkspaceState();
        await refreshWorkspaceTree({ skipPersist: true, silent: true });
      } else {
        renderWorkspaceMeta();
        renderEditor();
      }
      if (!silent) setStatus("设置已保存。");
      return state.currentSession;
    }

    async function pickLocalPath(kind) {
      if (state.streamController) {
        setStatus("请先等待当前流式运行结束。");
        return;
      }
      const isFile = kind === "file";
      const endpoint = isFile ? "/system/pick-file" : "/system/pick-folder";
      try {
        setStatus(isFile ? "正在打开文件选择器..." : "正在打开文件夹选择器...");
        const payload = await fetchJson(endpoint, { method: "POST" });
        if (!payload.selected) {
          setStatus("已取消选择。");
          return;
        }
        els.workspaceInput.value = payload.workspace_root || "";
        renderSessions();
        state.pendingPickedFilePath = payload.relative_path || "";
        if (!state.currentSession) {
          setStatus(
            isFile
              ? `已选择 ${payload.path}。创建会话后会自动打开文件。`
              : `已选择工作区 ${payload.workspace_root}`
          );
          return;
        }
        await persistCurrentControls({ silent: true, refreshWorkspace: true });
        if (isFile && payload.relative_path) {
          await openFile(payload.relative_path, { skipPersist: true, quiet: true });
          state.pendingPickedFilePath = "";
          setStatus(`已打开 ${payload.path}`);
          return;
        }
        state.pendingPickedFilePath = "";
        setStatus(`已选择工作区 ${payload.workspace_root}`);
      } catch (error) {
        setStatus(error.message || "打开本地选择器失败。");
      }
    }

    async function refreshWorkspaceTree({ skipPersist = false, silent = false } = {}) {
      if (!state.currentSession) {
        renderWorkspaceMeta();
        renderWorkspaceTree();
        return;
      }
      if (!skipPersist) await persistCurrentControls({ silent: true, refreshWorkspace: false });
      if (!state.currentSession.workspace_root) {
        state.workspaceEntries = [];
        renderWorkspaceMeta();
        renderWorkspaceTree();
        return;
      }
      const payload = await fetchJson(`/sessions/${state.currentSession.session_id}/workspace/tree?path=.&depth=8&max_entries=2000`);
      state.workspaceEntries = payload.entries || [];
      for (const entry of state.workspaceEntries) {
        if (entry.is_dir && normPath(entry.path).split("/").length <= 1) state.expanded[entry.path] = true;
      }
      if (state.activeFilePath) ensureExpanded(state.activeFilePath);
      renderWorkspaceMeta(payload.note || "");
      renderWorkspaceTree();
      if (!silent) setStatus("已刷新文件树。");
    }

    async function openFile(path, { forceReload = false, skipPersist = false, quiet = false } = {}) {
      const normalizedPath = normPath(path);
      const existing = getOpenFile(normalizedPath);
      if (existing && !forceReload) {
        state.activeFilePath = existing.path;
        ensureExpanded(existing.path);
        renderWorkspaceTree();
        renderFileTabs();
        renderEditor();
        return;
      }
      if (existing?.dirty && forceReload && !window.confirm(`重新加载 ${existing.path} 会覆盖未保存修改。是否继续？`)) return;
      if (!skipPersist) await persistCurrentControls({ silent: true, refreshWorkspace: false });
      const payload = await fetchJson(`/sessions/${state.currentSession.session_id}/workspace/file?path=${encodeURIComponent(normalizedPath)}`);
      upsertOpenFile({
        path: payload.path,
        name: baseName(payload.path),
        content: payload.content,
        originalContent: payload.content,
        contentHash: payload.content_sha256,
        dirty: false,
        truncated: !!payload.truncated
      });
      renderWorkspaceTree();
      renderFileTabs();
      renderEditor();
      if (!quiet) {
        setStatus(payload.truncated ? `已打开 ${payload.path}，但文件过大，当前只读。` : `已打开 ${payload.path}`);
      }
    }

    async function reloadActiveFile() {
      const file = getActiveFile();
      if (!file) {
        setStatus("请先打开文件。");
        return;
      }
      await openFile(file.path, { forceReload: true });
    }

    async function saveActiveFile() {
      if (state.streamController) {
        setStatus("请先等待当前流式运行结束。");
        return;
      }
      const file = getActiveFile();
      if (!file) {
        setStatus("请先打开文件。");
        return;
      }
      if (file.truncated) {
        setStatus("当前文件过大，只读展示，无法直接保存。");
        return;
      }
      await persistCurrentControls({ silent: true, refreshWorkspace: false });
      if (!state.currentSession?.settings?.allow_write) {
        setStatus("请先开启“允许写盘”并保存设置。");
        renderEditor();
        return;
      }
      const payload = await fetchJson(`/sessions/${state.currentSession.session_id}/workspace/file`, {
        method: "PUT",
        body: JSON.stringify({
          path: file.path,
          content: file.content,
          expected_content_hash: file.contentHash || undefined
        })
      });
      upsertOpenFile({
        ...file,
        content: file.content,
        originalContent: file.content,
        contentHash: payload.content_sha256,
        dirty: false,
        truncated: false
      });
      renderFileTabs();
      renderEditor();
      await refreshWorkspaceTree({ skipPersist: true, silent: true });
      setStatus(`已保存 ${payload.path}`);
    }

    function closeFileTab(path) {
      const file = getOpenFile(path);
      if (file?.dirty && !window.confirm(`关闭 ${file.path} 会丢失未保存修改。是否继续？`)) return;
      state.openFiles = state.openFiles.filter(item => item.path !== path);
      if (state.activeFilePath === path) state.activeFilePath = state.openFiles[0]?.path || "";
      renderFileTabs();
      renderEditor();
      renderWorkspaceTree();
    }

    function appendPendingAssistant() {
      state.pendingAssistantText = "";
      state.pendingAssistantEl = document.createElement("div");
      state.pendingAssistantEl.className = "message assistant loading";
      state.pendingAssistantEl.textContent = "处理中...";
      els.messages.appendChild(state.pendingAssistantEl);
      els.messages.scrollTop = els.messages.scrollHeight;
    }

    function clearPendingAssistant() {
      state.pendingAssistantText = "";
      if (state.pendingAssistantEl) state.pendingAssistantEl.remove();
      state.pendingAssistantEl = null;
    }

    function parseSseEventBlock(block) {
      let eventName = "message";
      const dataLines = [];
      for (const raw of block.split("\n")) {
        const line = raw.replace(/\r$/, "");
        if (!line || line.startsWith(":")) continue;
        if (line.startsWith("event:")) {
          eventName = line.slice(6).trim() || "message";
          continue;
        }
        if (line.startsWith("data:")) {
          let value = line.slice(5);
          if (value.startsWith(" ")) value = value.slice(1);
          dataLines.push(value);
        }
      }
      if (!dataLines.length) return null;
      return { eventName, data: dataLines.join("\n") };
    }

    function drainSseBuffer(buffer, flush = false) {
      let remaining = buffer.replace(/\r\n/g, "\n");
      const blocks = [];
      while (true) {
        const boundary = remaining.indexOf("\n\n");
        if (boundary === -1) break;
        const block = remaining.slice(0, boundary);
        remaining = remaining.slice(boundary + 2);
        if (block.trim()) blocks.push(block);
      }
      if (flush && remaining.trim()) {
        blocks.push(remaining);
        remaining = "";
      }
      return { blocks, buffer: remaining };
    }

    function processSseEventBlock(block) {
      const parsed = parseSseEventBlock(block);
      if (!parsed) return;
      let payload;
      try {
        payload = JSON.parse(parsed.data);
      } catch {
        throw new Error("流式事件解析失败。");
      }
      handleStreamEvent(parsed.eventName, payload);
    }

    function finalizeStream(fallbackStatus) {
      const terminal = state.streamTerminalStatus || fallbackStatus || "";
      clearPendingAssistant();
      if (state.currentSession) renderMessages(state.currentSession);
      state.streamController = null;
      state.streamStopRequested = false;
      state.streamTerminalStatus = "";
      setStreamingControls(false);
      renderEditor();
      if (terminal) setStatus(terminal);
    }

    function handleStreamEvent(eventName, data) {
      if (eventName === "session") {
        state.currentSession = data;
        applySessionToControls(state.currentSession);
        renderMessages(state.currentSession);
        renderTasks(state.currentSession.tasks);
        renderTestSummary(state.currentSession.last_test_summary);
        updateMeta();
        refreshSessions().catch(error => setStatus(error.message));
        return;
      }
      if (eventName === "task_board") {
        if (state.currentSession) state.currentSession.tasks = data;
        renderTasks(data);
        return;
      }
      if (eventName === "task_update") {
        if (!state.currentSession) return;
        const tasks = state.currentSession.tasks || [];
        const id = data.task_id || data.id;
        const next = tasks.map(task => (task.id === id ? { ...task, ...data, id: task.id } : task));
        state.currentSession.tasks = next.some(task => task.id === id) ? next : [...next, data];
        renderTasks(state.currentSession.tasks);
        return;
      }
      if (eventName === "assistant_delta") {
        state.pendingAssistantText += data.content || "";
        if (state.pendingAssistantEl) {
          state.pendingAssistantEl.classList.remove("loading");
          state.pendingAssistantEl.textContent = state.pendingAssistantText;
          els.messages.scrollTop = els.messages.scrollHeight;
        }
        return;
      }
      if (eventName === "assistant_final") {
        if (state.pendingAssistantEl) {
          state.pendingAssistantEl.classList.remove("loading");
          state.pendingAssistantEl.textContent = data.content || state.pendingAssistantText;
        }
        return;
      }
      if (eventName === "test_summary") {
        renderTestSummary(data);
        return;
      }
      if (eventName === "error") {
        clearPendingAssistant();
        if (state.currentSession) renderMessages(state.currentSession);
        setStreamTerminalStatus(data.message || "流式执行失败。");
      }
    }

    async function sendMessage() {
      if (state.streamController) {
        setStatus("请先等待当前流式运行结束。");
        return;
      }
      if (!state.currentSession) {
        setStatus("请先创建或选择会话。");
        return;
      }
      const content = els.messageInput.value.trim();
      if (!content) {
        setStatus("请输入消息。");
        return;
      }
      els.messageInput.value = "";
      setStatus("保存设置并开始执行...");
      try {
        await persistCurrentControls({ silent: true, refreshWorkspace: false });
      } catch (error) {
        setStatus(error.message || "设置保存失败。");
        return;
      }
      setStatus("进行中...");
      state.currentSession.messages = [...(state.currentSession.messages || []), { role: "user", content }];
      renderMessages(state.currentSession);
      appendPendingAssistant();
      state.streamController = new AbortController();
      state.streamStopRequested = false;
      state.streamTerminalStatus = "";
      setStreamingControls(true);
      try {
        const response = await fetch(`/sessions/${state.currentSession.session_id}/messages?stream=1`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ content }),
          signal: state.streamController.signal
        });
        if (!response.ok || !response.body) throw new Error(`请求失败: ${response.status}`);
        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let buffer = "";
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const drained = drainSseBuffer(buffer);
          buffer = drained.buffer;
          for (const block of drained.blocks) processSseEventBlock(block);
        }
        buffer += decoder.decode();
        const flushed = drainSseBuffer(buffer, true);
        for (const block of flushed.blocks) processSseEventBlock(block);
        finalizeStream("已完成。");
      } catch (error) {
        if (error.name === "AbortError") {
          setStreamTerminalStatus(state.streamTerminalStatus || (state.streamStopRequested ? "已取消。" : "流式已中断。"));
        } else {
          setStreamTerminalStatus(error.message || "发送失败。");
        }
        finalizeStream(state.streamTerminalStatus);
      }
    }

    async function runTests() {
      if (state.streamController) {
        setStatus("请先等待当前流式运行结束。");
        return;
      }
      if (!state.currentSession) {
        setStatus("请先选择会话。");
        return;
      }
      setStatus("保存设置并运行测试...");
      try {
        await persistCurrentControls({ silent: true, refreshWorkspace: false });
        const payload = await fetchJson(`/sessions/${state.currentSession.session_id}/tests/run`, { method: "POST" });
        state.currentSession = payload.session;
        renderTestSummary(payload.summary);
        renderMessages(state.currentSession);
        renderTasks(state.currentSession.tasks);
        updateMeta();
        await refreshSessions();
        setStatus("测试执行完成。");
      } catch (error) {
        setStatus(error.message || "测试执行失败。");
      }
    }

    async function deleteCurrentSession() {
      if (state.streamController) {
        setStatus("请先等待当前流式运行结束。");
        return;
      }
      if (!state.currentSession) {
        setStatus("请先选择会话。");
        return;
      }
      if (hasDirtyOpenFiles() && !window.confirm("你有未保存的文件修改。删除会话后，这些改动不会被恢复。是否继续进入删除确认？")) return;
      const sessionId = state.currentSession.session_id;
      const title = state.currentSession.title || "当前会话";
      const nextFilter = normPath(state.currentSession.workspace_root);
      if (!window.confirm(`确认永久删除会话「${title}」？这会移除消息、任务、最近测试记录和当前会话设置，且无法恢复。`)) return;
      try {
        await fetchJson(`/sessions/${sessionId}`, { method: "DELETE" });
        state.currentSession = null;
        clearPendingAssistant();
        resetWorkspaceState();
        await refreshSessions();
        const nextSession = preferredSession(nextFilter);
        if (nextSession) await loadSession(nextSession.session_id);
        else {
          renderMessages(null);
          renderTasks([]);
          renderTestSummary(null);
          updateMeta();
        }
        setStatus("会话已删除。");
      } catch (error) {
        setStatus(error.message || "删除会话失败。");
      }
    }

    els.editorTextarea.addEventListener("input", () => {
      const file = getActiveFile();
      if (!file) return;
      file.content = els.editorTextarea.value;
      file.dirty = file.content !== file.originalContent;
      renderFileTabs();
      renderEditor();
    });
    els.maxTurnsInput.addEventListener("change", () => {
      els.maxTurnsInput.value = normalizeMaxTurns(els.maxTurnsInput.value);
    });
    els.workspaceInput.addEventListener("input", () => renderSessions());
    els.messageInput.addEventListener("keydown", event => {
      if (event.key !== "Enter" || event.shiftKey || event.isComposing) return;
      event.preventDefault();
      sendMessage();
    });
    els.newSessionBtn.addEventListener("click", () => createSession().catch(error => setStatus(error.message)));
    els.openFolderBtn.addEventListener("click", () => pickLocalPath("folder"));
    els.openFileBtn.addEventListener("click", () => pickLocalPath("file"));
    els.saveSettingsBtn.addEventListener("click", () => persistCurrentControls({ refreshWorkspace: true }).catch(error => setStatus(error.message)));
    els.deleteSessionBtn.addEventListener("click", () => deleteCurrentSession());
    drawerButtons.forEach(button => {
      button.addEventListener("click", () => toggleContextDrawer(button.dataset.drawerTarget));
    });
    els.closeDrawerBtn.addEventListener("click", () => {
      state.drawerOpen = false;
      renderContextDrawer();
    });
    els.sendBtn.addEventListener("click", () => sendMessage());
    els.runTestsBtn.addEventListener("click", () => runTests());
    els.refreshTreeBtn.addEventListener("click", () => refreshWorkspaceTree().catch(error => setStatus(error.message)));
    els.reloadFileBtn.addEventListener("click", () => reloadActiveFile().catch(error => setStatus(error.message)));
    els.saveFileBtn.addEventListener("click", () => saveActiveFile().catch(error => setStatus(error.message)));
    els.stopBtn.addEventListener("click", () => {
      if (!state.streamController) return;
      state.streamStopRequested = true;
      clearPendingAssistant();
      if (state.currentSession) renderMessages(state.currentSession);
      setStreamTerminalStatus("已取消。");
      state.streamController.abort();
    });
    els.toggleLeftSidebarBtn.addEventListener("click", toggleLeftSidebar);
    els.toggleRightSidebarBtn.addEventListener("click", toggleRightSidebar);

    document.addEventListener("click", event => {
      if (!els.toolbarMoreMenu) return;
      if (!els.toolbarMoreMenu.contains(event.target)) els.toolbarMoreMenu.open = false;
    });
    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && els.toolbarMoreMenu) els.toolbarMoreMenu.open = false;
    });

    readLayoutState();
    applyLayoutState();
    renderContextDrawer();
    setStreamingControls(false);
    renderWorkspaceMeta();
    renderWorkspaceTree();
    renderFileTabs();
    renderEditor();

    Promise.all([
      refreshSessions(),
      fetchJson("/eval/latest").then(renderEval)
    ]).then(async () => {
      const nextSession = preferredSession();
      if (nextSession) await loadSession(nextSession.session_id);
      else updateMeta();
    }).catch(error => setStatus(error.message));
  </script>
</body>
</html>
